<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>炸金花 - 联机版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #1a472a; --bg-secondary: #2d5a3d; --bg-table: #1e5631;
            --accent-gold: #f4d03f; --accent-orange: #e67e22; --accent-red: #e74c3c;
            --accent-blue: #3498db; --accent-green: #27ae60; --accent-purple: #9b59b6;
            --text-light: #ecf0f1; --text-dark: #2c3e50; --card-white: #ffffff;
            --shadow: rgba(0,0,0,0.3);
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        .join-screen {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, var(--bg-table) 0%, var(--bg-primary) 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }
        .join-screen.hidden { display: none; }
        .join-title {
            font-size: clamp(32px, 8vw, 48px); font-weight: 900;
            color: var(--accent-gold);
            text-shadow: 2px 2px 8px var(--shadow);
            margin-bottom: 8px;
        }
        .join-subtitle {
            font-size: clamp(12px, 3vw, 14px); color: var(--text-light);
            opacity: 0.6; margin-bottom: 30px;
        }
        .join-form {
            display: flex; flex-direction: column; gap: 16px;
            align-items: center; width: 100%; max-width: 300px;
        }
        .join-input {
            width: 100%; padding: 14px 20px; font-size: 16px;
            font-family: 'Noto Sans SC', sans-serif;
            border: 2px solid rgba(255,255,255,0.2); border-radius: 10px;
            background: rgba(255,255,255,0.1); color: var(--text-light);
            outline: none; text-align: center; transition: border-color 0.3s;
        }
        .join-input:focus { border-color: var(--accent-gold); }
        .join-input::placeholder { color: rgba(255,255,255,0.3); }
        .join-btn {
            width: 100%; padding: 14px; font-size: 18px; font-weight: 700;
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--accent-gold); color: var(--text-dark);
            border: none; border-radius: 10px; cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(244,208,63,0.3);
        }
        .join-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(244,208,63,0.5); }
        .join-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .join-status {
            font-size: 13px; color: var(--accent-gold);
            margin-top: 10px; min-height: 20px; text-align: center;
        }
        .waiting-list {
            margin-top: 30px; text-align: center;
            width: 100%; max-width: 400px;
        }
        .waiting-title { font-size: 14px; color: var(--text-light); opacity: 0.7; margin-bottom: 10px; }
        .waiting-players { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .waiting-player {
            background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 20px;
            font-size: 14px; color: var(--text-light);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .waiting-player.host::after { content: ' (房主)'; color: var(--accent-gold); font-size: 12px; }
        .start-game-btn {
            margin-top: 24px; padding: 12px 40px; font-size: 16px; font-weight: 700;
            background: var(--accent-green); color: white; border: none; border-radius: 10px;
            cursor: pointer; transition: all 0.3s; font-family: 'Noto Sans SC', sans-serif;
            box-shadow: 0 4px 15px rgba(39,174,96,0.3);
        }
        .start-game-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(39,174,96,0.5); }
        .start-game-btn.hidden { display: none; }

        .game-container {
            width: 100vw; height: 100vh; position: relative;
            background: radial-gradient(ellipse at center, var(--bg-table) 0%, var(--bg-primary) 100%);
        }
        .game-container.hidden { display: none; }
        .table-texture {
            position: absolute; inset: 0;
            background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.02) 0%, transparent 50%),
                             radial-gradient(circle at 80% 70%, rgba(255,255,255,0.02) 0%, transparent 50%);
            pointer-events: none;
        }

        .top-bar {
            position: absolute; top: 0; left: 0; right: 0; height: 60px;
            background: rgba(0,0,0,0.4); display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; z-index: 100;
        }
        .game-title {
            font-size: clamp(16px, 4vw, 22px); font-weight: 900;
            color: var(--accent-gold); text-shadow: 2px 2px 4px var(--shadow);
        }
        .top-info { display: flex; gap: 15px; align-items: center; }
        .info-item {
            font-size: clamp(12px, 2.5vw, 14px); color: var(--text-light);
            display: flex; align-items: center; gap: 6px;
        }
        .info-value {
            font-size: clamp(14px, 3vw, 18px); font-weight: 700;
            color: var(--accent-gold);
        }
        .conn-status { font-size: 12px; color: var(--accent-green); margin-left: 10px; }

        .bottom-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 16px;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; z-index: 100;
            min-height: 85px;
            flex-wrap: wrap;
        }

        .action-btn-wrapper {
            display: flex; flex-direction: column;
            align-items: center; gap: 4px;
        }

        .action-btn {
            padding: 12px 22px; font-size: 15px; font-weight: 700;
            border: 2px solid transparent; border-radius: 10px;
            cursor: pointer; transition: all 0.25s ease;
            letter-spacing: 1px; font-family: 'Noto Sans SC', sans-serif;
            min-width: 80px; text-align: center;
            position: relative;
        }

        .btn-fold { background: var(--accent-red); color: white; }
        .btn-fold:not(:disabled):hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(231,76,60,0.5); border-color: rgba(255,255,255,0.3); }

        .btn-look { background: var(--accent-purple); color: white; }
        .btn-look:not(:disabled):hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(155,89,182,0.5); border-color: rgba(255,255,255,0.3); }

        .btn-call { background: var(--accent-blue); color: white; }
        .btn-call:not(:disabled):hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(52,152,219,0.5); border-color: rgba(255,255,255,0.3); }

        .btn-raise { background: var(--accent-gold); color: var(--text-dark); }
        .btn-raise:not(:disabled):hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(244,208,63,0.5); border-color: rgba(255,255,255,0.3); }

        .btn-compare { background: #1abc9c; color: white; }
        .btn-compare:not(:disabled):hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(26,188,156,0.5); border-color: rgba(255,255,255,0.3); }

        .action-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            filter: grayscale(0.6);
            transform: none !important;
            box-shadow: none !important;
            border-color: transparent !important;
        }

        .action-reason {
            font-size: 10px; color: rgba(255,255,255,0.35);
            min-height: 14px; text-align: center;
            white-space: nowrap;
        }

        .seat {
            position: absolute; display: flex; flex-direction: column;
            align-items: center; transition: all 0.3s ease;
        }
        .seat.active .player-info { box-shadow: 0 0 20px var(--accent-gold); }

        .seat-0 { bottom: 120px; left: 50%; transform: translateX(-50%); }
        .seat-1 { bottom: 240px; left: 5%; }
        .seat-2 { bottom: 360px; left: 15%; }
        .seat-3 { top: 80px; left: 50%; transform: translateX(-50%); }
        .seat-4 { bottom: 360px; right: 15%; }
        .seat-5 { bottom: 240px; right: 5%; }

        .player-info {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 10px 15px;
            text-align: center; min-width: 110px;
            border: 2px solid transparent; transition: all 0.3s ease;
            position: relative;
        }
        .player-info.winner { border-color: var(--accent-gold); background: rgba(244,208,63,0.2); }
        .player-info.dealer { border-color: var(--accent-orange); }
        .player-info.has-looked { border-color: var(--accent-purple); background: rgba(155,89,182,0.15); }
        .player-info.folded { opacity: 0.5; }

        /* 左上角徽章（庄家/报喜/庄|报喜） */
        .badge-top-left {
            position: absolute; top: -10px; left: -10px;
            color: white; padding: 4px 10px; border-radius: 12px;
            font-size: 11px; font-weight: 700; z-index: 10;
            white-space: nowrap;
        }
        .badge-top-left.dealer-only {
            background: var(--accent-orange);
            box-shadow: 0 2px 8px rgba(230,126,34,0.5);
        }
        .badge-top-left.baoxi-only {
            background: var(--accent-orange);
            box-shadow: 0 2px 8px rgba(230,126,34,0.5);
            animation: pulse 2s infinite;
        }
        .badge-top-left.dealer-baoxi {
            background: linear-gradient(135deg, var(--accent-orange) 0%, var(--accent-gold) 100%);
            box-shadow: 0 2px 8px rgba(244,208,63,0.5);
            animation: pulse 2s infinite;
        }

        /* 右上角徽章（已看牌） */
        .badge-top-right {
            position: absolute; top: -10px; right: -10px;
            background: var(--accent-purple); color: white;
            padding: 4px 10px; border-radius: 12px;
            font-size: 11px; font-weight: 700; z-index: 10;
            box-shadow: 0 2px 8px rgba(155,89,182,0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        .player-name { font-size: 14px; font-weight: 700; color: var(--text-light); margin-bottom: 5px; }
        .player-chips { font-size: 18px; font-weight: 700; transition: all 0.3s ease; }
        .player-chips.positive { color: var(--accent-green); }
        .player-chips.negative { color: var(--accent-red); }
        .player-chips.zero { color: var(--text-light); }
        .player-status { font-size: 12px; color: var(--accent-orange); margin-top: 5px; min-height: 18px; }
        .bet-info { font-size: 11px; color: var(--accent-purple); margin-top: 3px; min-height: 14px; }

        .cards-container {
            display: flex; gap: 8px; margin-top: 10px;
            justify-content: center; position: relative;
        }
        .card {
            width: 60px; height: 84px; background: var(--card-white);
            border-radius: 8px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-weight: 700; box-shadow: 0 4px 8px var(--shadow);
            position: relative; transition: transform 0.6s ease; cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); }
        .card.red { color: #e74c3c !important; }
        .card.black { color: #2c3e50 !important; }
        .card-back {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            position: relative; overflow: hidden;
        }
        .card-back::before {
            content: ''; position: absolute; inset: 5px;
            border: 2px solid rgba(255,255,255,0.2); border-radius: 4px;
        }
        .card-back::after { content: '♠'; font-size: 24px; color: rgba(255,255,255,0.3); }
        .card-front {
            display: none; flex-direction: column; align-items: center;
            justify-content: center; width: 100%; height: 100%;
        }
        .card.flipped .card-back { display: none !important; }
        .card.flipped .card-front { display: flex !important; }
        .card-rank { font-size: 22px; line-height: 1; font-weight: 700; }
        .card-suit { font-size: 26px; line-height: 1; }
        .card-small {
            position: absolute; top: 4px; left: 6px; font-size: 11px;
            display: flex; flex-direction: column; align-items: center; line-height: 1;
        }
        .card-small .card-suit { font-size: 10px; }

        .message-area {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index: 200; pointer-events: none;
        }
        .game-message {
            font-size: 28px; font-weight: 900; color: var(--accent-gold);
            text-shadow: 2px 2px 8px var(--shadow);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .game-message.show { opacity: 1; }

        .round-indicator {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.5); padding: 8px 20px; border-radius: 20px;
            color: var(--text-light); font-weight: 700; font-size: 14px;
            white-space: nowrap;
        }

        .action-log-panel {
            position: absolute; top: 70px; right: 20px;
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px;
            color: var(--text-light); font-size: 12px;
            width: 220px; max-height: 200px; z-index: 50;
            overflow: hidden; display: flex; flex-direction: column;
        }
        .action-log-title {
            font-size: 14px; font-weight: 700; color: var(--accent-gold);
            margin-bottom: 10px; flex-shrink: 0;
        }
        .action-log-container { flex: 1; overflow-y: auto; padding-right: 5px; }
        .action-log-container::-webkit-scrollbar { width: 4px; }
        .action-log-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 2px; }
        .action-log-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
        .action-log-entry {
            margin-bottom: 5px; line-height: 1.4;
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;
        }
        .action-log-entry:last-child { border-bottom: none; }
        .log-player-name { font-weight: 700; color: var(--accent-gold); }
        .log-action { color: var(--text-light); }
        .log-action.look { color: var(--accent-purple); }
        .log-action.fold { color: var(--accent-red); }
        .log-action.call { color: var(--accent-blue); }
        .log-action.raise { color: var(--accent-gold); }
        .log-action.compare { color: #1abc9c; }
        .log-action.baoxi { color: #e67e22; }
        .log-action.huoxi { color: #f4d03f; }
        .log-round { font-size: 11px; color: rgba(255,255,255,0.5); margin-left: 5px; }

        .compare-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 500;
        }
        .compare-modal.show { display: flex; }
        .compare-content {
            background: var(--bg-secondary); padding: 30px;
            border-radius: 16px; text-align: center; max-width: 90vw;
        }
        .compare-title {
            font-size: 22px; font-weight: 700; color: var(--text-light);
            margin-bottom: 20px;
        }
        .compare-options { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .compare-option {
            padding: 15px 25px; background: rgba(255,255,255,0.1);
            border: 2px solid transparent; border-radius: 10px;
            color: var(--text-light); cursor: pointer; transition: all 0.2s ease;
            font-family: 'Noto Sans SC', sans-serif; font-size: 15px;
        }
        .compare-option:hover { border-color: var(--accent-gold); background: rgba(244,208,63,0.2); }
        .compare-cancel {
            margin-top: 20px; padding: 10px 30px;
            background: var(--accent-red); color: white;
            border: none; border-radius: 8px; cursor: pointer;
            font-weight: 700; font-family: 'Noto Sans SC', sans-serif;
        }

        .restart-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 14px 40px; font-size: 18px; font-weight: 700;
            background: var(--accent-green); color: white;
            border: none; border-radius: 10px; cursor: pointer; z-index: 300;
            transition: all 0.3s; font-family: 'Noto Sans SC', sans-serif;
            box-shadow: 0 4px 20px rgba(39,174,96,0.3);
        }
        .restart-btn:hover { transform: translate(-50%, -50%) translateY(-2px); box-shadow: 0 8px 30px rgba(39,174,96,0.5); }
        .restart-btn.hidden { display: none; }

        @keyframes dealCard { 0%{transform:translateY(-200px) rotate(-20deg);opacity:0} 100%{transform:translateY(0) rotate(0);opacity:1} }
        .card.dealing { animation: dealCard 0.4s ease forwards; }
        @keyframes flipCard { 0%{transform:rotateY(0deg)} 50%{transform:rotateY(90deg)} 100%{transform:rotateY(0deg)} }
        .card.flipping { animation: flipCard 0.5s ease; }
        @keyframes winPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        .winner-anim { animation: winPulse 0.5s ease 3; }

        @media (max-width: 1024px) {
            .seat-1 { bottom: 220px; left: 3%; }
            .seat-5 { bottom: 220px; right: 3%; }
            .seat-2 { bottom: 320px; left: 10%; }
            .seat-4 { bottom: 320px; right: 10%; }
            .action-log-panel { width: 180px; }
        }

        @media (max-width: 768px) {
            .card { width: 45px; height: 63px; }
            .card-rank { font-size: 14px; }
            .card-suit { font-size: 18px; }
            .card-small { font-size: 9px; }
            .card-small .card-suit { font-size: 8px; }

            .seat-0 { bottom: 100px; left: 50%; transform: translateX(-50%); }
            .seat-1 { bottom: 180px; left: 2%; }
            .seat-2 { bottom: 260px; left: 12%; }
            .seat-3 { top: 70px; left: 50%; transform: translateX(-50%); }
            .seat-4 { bottom: 260px; right: 12%; }
            .seat-5 { bottom: 180px; right: 2%; }

            .player-info { padding: 8px 12px; min-width: 90px; }
            .player-name { font-size: 12px; }
            .player-chips { font-size: 16px; }

            .bottom-bar { gap: 8px; padding: 10px 12px; min-height: 80px; }
            .action-btn { padding: 10px 16px; font-size: 13px; min-width: 65px; }
            .action-reason { font-size: 9px; }

            .action-log-panel { display: none; }
            .top-bar { padding: 0 15px; height: 50px; }
            .round-indicator { top: 60px; font-size: 12px; padding: 6px 15px; }
            .game-message { font-size: 22px; }
        }

        @media (max-width: 480px) {
            .card { width: 38px; height: 53px; }
            .card-rank { font-size: 12px; }
            .card-suit { font-size: 16px; }
            .card-small { display: none; }

            .seat-0 { bottom: 90px; }
            .seat-1 { bottom: 150px; left: 0; }
            .seat-5 { bottom: 150px; right: 0; }
            .seat-2 { bottom: 210px; left: 5%; }
            .seat-4 { bottom: 210px; right: 5%; }

            .player-info { padding: 6px 10px; min-width: 80px; border-radius: 8px; }
            .player-name { font-size: 11px; }
            .player-chips { font-size: 14px; }
            .player-status { font-size: 10px; }
            .bet-info { font-size: 9px; }

            .bottom-bar { gap: 6px; padding: 8px 8px; min-height: 72px; flex-wrap: nowrap; overflow-x: auto; }
            .action-btn { padding: 8px 12px; font-size: 12px; min-width: 55px; letter-spacing: 0; }
            .action-reason { font-size: 8px; }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .seat-0 { bottom: 85px; }
            .seat-1 { bottom: 130px; left: 1%; }
            .seat-5 { bottom: 130px; right: 1%; }
            .seat-2 { bottom: 180px; left: 5%; }
            .seat-4 { bottom: 180px; right: 5%; }
            .seat-3 { top: 55px; }
            .bottom-bar { min-height: 70px; padding: 8px 12px; }
            .action-btn { padding: 8px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>

    <div class="join-screen" id="joinScreen">
        <div class="join-title">炸金花</div>
        <div class="join-subtitle">联机版 - 和朋友一起玩</div>
        <div class="join-form">
            <input type="text" class="join-input" id="nameInput" placeholder="输入昵称" maxlength="8" autocomplete="off">
            <button class="join-btn" id="joinBtn">加入房间</button>
        </div>
        <div class="join-status" id="joinStatus"></div>
        <div class="waiting-list" id="waitingList" style="display:none;">
            <div class="waiting="waiting-players" id="waitingPlayers"></div>
            <button class="start-game-btn-title">等待玩家中...</div>
            <div class hidden" id="startBtn">开始游戏</button>
        </div>
    </div>

    <div class="game-container hidden" id="gameContainer">
        <div class="table-texture"></div>
        <div class="top-bar">
            <div class="game-title">炸金花 <span class="conn-status" id="connStatus">● 已连接</span></div>
            <div class="top-info">
                <div class="info-item"><span>底注:</span><span class="info-value" id="baseBetDisplay">5</span></div>
                <div class="info-item"><span>总底池:</span><span class="info-value" id="potAmount">0</span></div>
            </div>
        </div>
        <div class="round-indicator" id="roundIndicator">等待开始</div>
        <div class="action-log-panel" id="actionLogPanel">
            <div class="action-log-title">操作记录</div>
            <div class="action-log-container" id="actionLogContainer"></div>
        </div>

        <div class="seat seat-0" id="seat0">
            <div class="player-info" id="playerInfo0">
                <div class="player-name" id="name0">-</div>
                <div class="player-chips zero" id="chips0">0</div>
                <div class="player-status" id="status0"></div>
                <div class="bet-info" id="betInfo0"></div>
            </div>
            <div class="cards-container" id="cards0"></div>
        </div>
        <div class="seat seat-1" id="seat1">
            <div class="player-info" id="playerInfo1">
                <div class="player-name" id="name1">-</div>
                <div class="player-chips zero" id="chips1">0</div>
                <div class="player-status" id="status1"></div>
                <div class="bet-info" id="betInfo1"></div>
            </div>
            <div class="cards-container" id="cards1"></div>
        </div>
        <div class="seat seat-2" id="seat2">
            <div class="player-info" id="playerInfo2">
                <div class="player-name" id="name2">-</div>
                <div class="player-chips zero" id="chips2">0</div>
                <div class="player-status" id="status2"></div>
                <div class="bet-info" id="betInfo2"></div>
            </div>
            <div class="cards-container" id="cards2"></div>
        </div>
        <div class="seat seat-3" id="seat3">
            <div class="player-info" id="playerInfo3">
                <div class="player-name" id="name3">-</div>
                <div class="player-chips zero" id="chips3">0</div>
                <div class="player-status" id="status3"></div>
                <div class="bet-info" id="betInfo3"></div>
            </div>
            <div class="cards-container" id="cards3"></div>
        </div>
        <div class="seat seat-4" id="seat4">
            <div class="player-info" idips zero" id="playerInfo4">
                <div class="player-name" id="name4">-</div="chips4">0</div>
                <div class="player-status" id="status4"></div>
                <div class="bet-info" id="betInfo4"></div>
            </div>
            <div class="cards-container" id="cards4"></div>
        </div>
        <div class="seat seat-5" id="seat5">
            <div class="player-info" id="playerInfo5">
                <div class="player-name" id="name5">-</div>
                <div class="player-chips zero" id="chips5">0</div>
                <div class="player-status" id="status5"></div>
                <div class="bet-info" id="betInfo5"></div>
            </div>
            <div class="cards-container" id="cards5"></div>
        </div>

        <div class="bottom-bar" id="bottomBar"></div>

        <button class="restart-btn hidden" id="restartBtn">再来一局</button>
        <div class="message-area"><div class="game-message" id="gameMessage"></div></div>

        <div class="compare-modal" id="compareModal">
            <div class="compare-content">
                <div class="compare-title">选择要敲牌的玩家</div>
                <div class="compare-options" id="compareOptions"></div>
                <button class="compare-cancel" id="compareCancel">取消</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
    (function() {
        var socket = null;
        var myIndex = -1;
        var gameState = null;
        var mySocketId = null;

        var $ = function(id) { return document.getElementById(id); };
        var joinScreen    = $('joinScreen');
        var gameContainer = $('gameContainer');
        var nameInput     = $('nameInput');
        var joinBtn       = $('joinBtn');
        var joinStatus    = $('joinStatus');
        var waitingList   = $('waitingList');
        var waiting>
                <div class="player-chPlayers= $('waitingPlayers');
        var startBtn      = $('startBtn');
        var restartBtn    = $('restartBtn');
        var bottomBar     = $('bottomBar');
        var compareModal  = $('compareModal');
        var compareOptions= $('compareOptions');

        joinBtn.onclick = doJoin;
        nameInput.onkeydown = function(e) { if (e.key === 'Enter') doJoin(); };

        function doJoin() {
            var name = nameInput.value.trim();
            if (!name) { nameInput.focus(); return; }
            joinBtn.disabled = true;
            joinStatus.textContent = '连接中（首次可能需要等待约30秒）...';

            socket = io({
                reconnection: true,
                reconnectionDelay: 2000,
                reconnectionAttempts: 10
            });
            setupSocketEvents();

            socket.on('connect', function() {
                mySocketId = socket.id;
                joinStatus.textContent = '已连接，加入房间...';
                socket.emit('join', { name: name, room: 'main' });
            });

            socket.on('connect_error', function() {
                joinStatus.textContent = '连接中...（服务器唤醒中，请耐心等待）';
            });
        }

        function setupSocketEvents() {
            socket.on('joined', function(data) {
                myIndex = data.playerIndex;
                joinStatus.textContent = '已加入，等待其他玩家...';
            });

            socket.on('waiting', function(data) {
                waitingList.style.display = 'block';
                waitingPlayers.innerHTML = '';
                var iAmHost = false;
                data.players.forEach(function(p) {
                    var div = document.createElement('div');
                    div.className = 'waiting-player' + (p.isHost ? ' host' : '');
                    div.textContent = p.name;
                    waitingPlayers.appendChild(div);
                    if (p.isHost) iAmHost = true;
                });
                if (data.players.length >= 2 && iAmHost) startBtn.classList.remove('hidden');
                else startBtn.classList.add('hidden');
            });

            startBtn.onclick = function() { socket.emit('start_game'); };

            socket.on('game_started', function() {
                joinScreen.classList.add('hidden');
                gameContainer.classList.remove('hidden');
                restartBtn.classList.add('hidden');
                clearLog();
                addLogEntry('系统', '游戏开始！', 'call', 0);
            });

            socket.on('state_update', function(state) {
                gameState = state;
                renderState(state);
            });

            socket.on('your_cards', function(data) {
                if (myIndex >= 0) {
                    flipMyCards(myIndex, data.cards);
                }
            });

            socket.on('player_looked', function(data) {
                if (data.playerIndex !== myIndex) {
                    flipOtherCards(data.playerIndex);
                }
                if (gameState && gameState.players[data.playerIndex]) {
                    showMessage(gameState.players[data.playerIndex].name + ' 看了牌');
                }
            });

            socket.on('compare_result', function(data) {
                var wName = gameState ? gameState.players[data.winner].name : '?';
                var lName = gameState ? gameState.players[data.loser].name : '?';
                showMessage(wName + ' 敲牌赢了 ' + lName + '！');
            });

            socket.on('game_over', function(data) {
                showMessage(data.winnerName + ' 赢了 ' + data.pot + ' 筹码！');
                addLogEntry(data.winnerName, '赢得 ' + data.pot + ' 筹码（' + data.handDesc + '）', 'call', 0);
                setTimeout(function() {
                    restartBtn.classList.remove('hidden');
                }, 3000);
            });

            restartBtn.onclick = function() {
                restartBtn.classList.add('hidden');
                socket.emit('start_game');
            };

            socket.on('log', function(data) {
                addLogEntry(data.name, data.action, data.type, data.round);
            });

            socket.on('error_msg', function(msg) {
                showMessage(msg);
                if (msg.indexOf('开始') !== -1 || msg.indexOf('房主') !== -1) {
                    setTimeout(function() { restartBtn.classList.remove('hidden'); }, 2000);
                }
            });

            socket.on('disconnect', function() {
                $('connStatus').textContent = '● 已断开';
                $('connStatus').style.color = '#e74c3c';
            });

            socket.on('reconnect', function() {
                mySocketId = socket.id;
                $('connStatus').textContent = '● 已连接';
                $('connStatus').style.color = '#27ae60';
                socket.emit('join', { name: nameInput.value.trim(), room: 'main' });
            });
        }

        function renderState(state) {
            $('potAmount').textContent = state.pot;
            $('baseBetDisplay').textContent = state.baseBet;

            if (state.phase === 'playing' && state.currentPlayerIndex >= 0 && state.players[state.currentPlayerIndex]) {
                var cp = state.players[state.currentPlayerIndex];
                var bi = cp.hasLooked ? '(明牌)' : '(暗牌)';
                var isMe = state.currentPlayerIndex === state.myIndex;
                $('roundIndicator').textContent = '第' + state.round + '轮 - ' + cp.name + '的回合 ' + bi + (isMe ? ' ← 你' : '');
            } else {
                var phases = { waiting: '等待中', playing: '游戏中', gameover: '游戏结束' };
                $('roundIndicator').textContent = phases[state.phase] || '准备中';
            }

            for (var i = 0; i < 6; i++) {
                if (i < state.players.length) {
                    $('seat' + i).style.display = 'flex';
                    renderPlayerSlot(i, state.players[i], state);
                } else {
                    $('seat' + i).style.display = 'none';
                }
            }

            for (var i = 0; i < 6; i++) $('seat' + i).classList.remove('active');
            if (state.phase === 'playing' && state.currentPlayerIndex >= 0)
                $('seat' + state.currentPlayerIndex).classList.add('active');

            renderBottomBar(state);
        }

        // 【修改】renderPlayerSlot - 左上角合并显示庄家/报喜
        function renderPlayerSlot(index, player, state) {
            var info = $('playerInfo' + index);
            var isMe = index === state.myIndex;

            $('name' + index).textContent = player.name + (isMe ? ' (你)' : '');

            var chipsEl = $('chips' + index);
            chipsEl.textContent = player.chips;
            chipsEl.classList.remove('positive', 'negative', 'zero');
            chipsEl.classList.add(player.chips > 0 ? 'positive' : player.chips < 0 ? 'negative' : 'zero');

            $('status' + index).textContent = player.status === 'folded' ? '已弃牌' : '';

            var betText = '';
            if (player.bet > 0) betText = '下注: ' + player.bet;
            $('betInfo' + index).textContent = betText;

            info.classList.toggle('folded', player.status === 'folded');
            info.classList.toggle('has-looked', player.hasLooked);

            // 【修改】清除所有旧徽章
            var oldBadges = info.querySelectorAll('.badge-top-left, .badge-top-right');
            oldBadges.forEach(function(b) { b.remove(); });
            info.classList.remove('dealer');

            // 【修改】左上角徽章：庄家/报喜/庄|报喜
            var isDealer = index === state.dealerIndex;
            var isBaoxi = player.baoxi;

            if (isDealer || isBaoxi) {
                var badge = document.createElement('div');
                badge.className = 'badge-top-left';

                if (isDealer && isBaoxi) {
                    badge.textContent = '庄|报喜';
                    badge.classList.add('dealer-baoxi');
                } else if (isDealer) {
                    badge.textContent = '庄';
                    badge.classList.add('dealer-only');
                } else {
                    badge.textContent = '报喜';
                    badge.classList.add('baoxi-only');
                }

                info.appendChild(badge);
                if (isDealer) info.classList.add('dealer');
            }

            // 【修改】右上角徽章：已看牌
            if (player.hasLooked && player.status !== 'folded') {
                var lookedBadge = document.createElement('div');
                lookedBadge.className = 'badge-top-right';
                lookedBadge.textContent = '已看牌';
                info.appendChild(lookedBadge);
            }

            info.classList.remove('winner', 'winner-anim');

            renderCardsForPlayer(index, player, state);
        }

        // 【修改】renderCardsForPlayer - 删除牌型显示
        function renderCardsForPlayer(index, player, state) {
            var container = $('cards' + index);

            if (player.cards && player.cards.length === 3) {
                container.innerHTML = '';
                player.cards.forEach(function(card) {
                    var cardEl = createCardElement(card);
                    if (player.status === 'folded') cardEl.style.opacity = '0.5';
                    container.appendChild(cardEl);
                });
                // 【删除】不再显示 hand-type 牌型文字
            } else {
                container.innerHTML = '';
                if (player.status !== 'folded' || state.phase === 'playing') {
                    for (var i = 0; i < 3; i++) {
                        var cardEl = document.createElement('div');
                        cardEl.className = 'card card-back';
                        container.appendChild(cardEl);
                    }
                }
            }
        }

        function createCardElement(card) {
            var cardEl = document.createElement('div');
            var isRed = card.suit === '♥' || card.suit === '♦';
            cardEl.className = 'card flipped ' + (isRed ? 'red' : 'black');
            cardEl.innerHTML = '<div class="card-front">' +
                '<div class="card-small"><span>' + card.rank + '</span><span class="card-suit">' + card.suit + '</span></div>' +
                '<span class="card-rank">' + card.rank + '</span>' +
                '<span class="card-suit">' + card.suit + '</span></div>';
            return cardEl;
        }

        function flipMyCards(playerIndex, cards) {
            var container = $('cards' + playerIndex);
            var cardEls = container.querySelectorAll('.card');

            if (cardEls.length === 0) {
                container.innerHTML = '';
                cards.forEach(function(card) {
                    var el = document.createElement('div');
                    el.className = 'card card-back';
                    container.appendChild(el);
                });
                cardEls = container.querySelectorAll('.card');
            }

            cardEls.forEach(function(cardEl, idx) {
                if (idx >= cards.length) return;
                var card = cards[idx];
                var isRed = card.suit === '♥' || card.suit === '♦';

                setTimeout(function() {
                    cardEl.classList.add('flipping');
                    setTimeout(function() {
                        cardEl.classList.remove('card-back', 'flipping');
                        cardEl.classList.add('flipped', isRed ? 'red' : 'black');
                        cardEl.innerHTML = '<div class="card-front">' +
                            '<div class="card-small"><span>' + card.rank + '</span><span class="card-suit">' + card.suit + '</span></div>' +
                            '<span class="card-rank">' + card.rank + '</span>' +
                            '<span class="card-suit">' + card.suit + '</span></div>';
                    }, 250);
                }, idx * 150);
            });
        }

        function flipOtherCards(playerIndex) {
            var cardEls = $('cards' + playerIndex).querySelectorAll('.card');
            cardEls.forEach(function(cardEl, idx) {
                setTimeout(function() {
                    cardEl.classList.add('flipping');
                    setTimeout(function() {
                        cardEl.classList.remove('flipping');
                    }, 500);
                }, idx * 150);
            });
        }

        function renderBottomBar(state) {
            bottomBar.innerHTML = '';

            var isMyTurn = state.phase === 'playing' &&
                           state.currentPlayerIndex === state.myIndex &&
                           state.availableActions.length > 0;

            var myPlayer = state.players[state.myIndex];
            var available = state.availableActions || [];
            var compareTargets = state.compareTargets || [];

            var baseBet = state.baseBet || 5;
            var hasLooked = myPlayer ? myPlayer.hasLooked : false;
            var callAmount = hasLooked ? baseBet * 2 : baseBet;
            var raiseAmount = hasLooked ? baseBet * 4 : baseBet * 2;

            var canFold    = available.indexOf('fold') !== -1;
            var canLook    = available.indexOf('look') !== -1;
            var canCall    = available.indexOf('call') !== -1;
            var canRaise   = available.indexOf('raise') !== -1;
            var canCompare = available.indexOf('compare') !== -1;

            var buttons = [
                {
                    label: '弃牌',
                    cls: 'btn-fold',
                    enabled: isMyTurn && canFold,
                    reason: isMyTurn ? '' : '等待回合'
                },
                {
                    label: '看牌',
                    cls: 'btn-look',
                    enabled: isMyTurn && canLook,
                    reason: hasLooked ? '已看牌' : (!isMyTurn ? '等待回合' : '')
                },
                {
                    label: '跟注 ' + callAmount,
                    cls: 'btn-call',
                    enabled: isMyTurn && canCall,
                    reason: !isMyTurn ? '等待回合' : ''
                },
                {
                    label: '加注 ' + raiseAmount,
                    cls: 'btn-raise',
                    enabled: isMyTurn && canRaise,
                    reason: !isMyTurn ? '等待回合' :
                            (state.hasRaised ? '已加注' : '')
                },
                {
                    label: '敲牌 ' + callAmount,
                    cls: 'btn-compare',
                    enabled: isMyTurn && canCompare,
                    reason: !isMyTurn ? '等待回合' :
                            (state.round < 2 ? '第2轮可用' :
                            (!hasLooked ? '需先看牌' : ''))
                }
            ];

            buttons.forEach(function(cfg) {
                var wrapper = document.createElement('div');
                wrapper.className = 'action-btn-wrapper';

                var btn = document.createElement('button');
                btn.className = 'action-btn ' + cfg.cls;
                btn.textContent = cfg.label;
                btn.disabled = !cfg.enabled;

                if (cfg.enabled) {
                    if (cfg.cls === 'btn-compare') {
                        if (compareTargets.length > 1) {
                            btn.onclick = function() { showCompareModal(compareTargets); };
                        } else if (compareTargets.length === 1) {
                            btn.onclick = function() { socket.emit('action', { action: 'compare', target: compareTargets[0] }); };
                        }
                    } else {
                        var actionName = cfg.cls.replace('btn-', '');
                        btn.onclick = (function(act) {
                            return function() { socket.emit('action', { action: act }); };
                        })(actionName);
                    }
                }

                wrapper.appendChild(btn);

                if (!cfg.enabled && cfg.reason) {
                    var reason = document.createElement('div');
                    reason.className = 'action-reason';
                    reason.textContent = cfg.reason;
                    wrapper.appendChild(reason);
                } else {
                    var placeholder = document.createElement('div');
                    placeholder.className = 'action-reason';
                    placeholder.innerHTML = '&nbsp;';
                    wrapper.appendChild(placeholder);
                }

                bottomBar.appendChild(wrapper);
            });
        }

        function showCompareModal(targets) {
            compareOptions.innerHTML = '';
            targets.forEach(function(t) {
                var name = gameState && gameState.players[t] ? gameState.players[t].name : ('玩家' + t);
                var opt = document.createElement('div');
                opt.className = 'compare-option'; opt.textContent = name;
                opt.onclick = function() {
                    compareModal.classList.remove('show');
                    socket.emit('action', { action: 'compare', target: t });
                };
                compareOptions.appendChild(opt);
            });
            compareModal.classList.add('show');
        }

        $('compareCancel').onclick = function() { compareModal.classList.remove('show'); };

        var msgTimer = null;
        function showMessage(text) {
            var m = $('gameMessage');
            m.textContent = text;
            m.classList.add('show');
            clearTimeout(msgTimer);
            msgTimer = setTimeout(function() { m.classList.remove('show'); }, 2500);
        }

        function addLogEntry(name, action, type, round) {
            var container = $('actionLogContainer');
            var entry = document.createElement('div');
            entry.className = 'action-log-entry';
            entry.innerHTML = '<span class="log-player-name">' + name + '</span> ' +
                '<span class="log-action ' + (type || '') + '">' + action + '</span>' +
                (round ? '<span class="log-round">第' + round + '轮</span>' : '');
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function clearLog() { $('actionLogContainer').innerHTML = ''; }
    })();
    </script>
