<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炸金花 - 联机版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #1a472a; --bg-secondary: #2d5a3d; --bg-table: #1e5631;
            --accent-gold: #f4d03f; --accent-orange: #e67e22; --accent-red: #e74c3c;
            --accent-blue: #3498db; --accent-green: #27ae60; --accent-purple: #9b59b6;
            --text-light: #ecf0f1; --text-dark: #2c3e50; --card-white: #ffffff;
            --shadow: rgba(0,0,0,0.3);

            /* 响应式变量 */
            --card-size: 60px;
            --card-height: 84px;
            --player-info-width: 110px;
            --action-btn-size: 15px;
            --action-btn-padding: 12px 24px;
            --gap-size: 8px;
            --border-radius: 12px;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            display: flex;
            flex-direction: column;
        }

        /* 加入界面 */
        .join-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, var(--bg-table) 0%, var(--bg-primary) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .join-screen.hidden { display: none; }
        .join-title {
            font-size: clamp(36px, 8vw, 48px);
            font-weight: 900;
            color: var(--accent-gold);
            text-shadow: 2px 2px 8px var(--shadow);
            margin-bottom: 8px;
            text-align: center;
        }
        .join-subtitle {
            font-size: clamp(12px, 3vw, 14px);
            color: var(--text-light);
            opacity: 0.6;
            margin-bottom: 40px;
            text-align: center;
        }
        .join-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            width: 100%;
            max-width: 300px;
        }
        .join-input {
            width: 100%;
            padding: 14px 20px;
            font-size: clamp(14px, 3vw, 16px);
            font-family: 'Noto Sans SC', sans-serif;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: var(--text-light);
            outline: none;
            text-align: center;
            transition: border-color 0.3s;
        }
        .join-input:focus { border-color: var(--accent-gold); }
        .join-input::placeholder { color: rgba(255,255,255,0.3); }
        .join-btn {
            width: 100%;
            padding: 14px;
            font-size: clamp(16px, 4vw, 18px);
            font-weight: 700;
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--accent-gold);
            color: var(--text-dark);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(244,208,63,0.3);
        }
        .join-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(244,208,63,0.5); }
        .join-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .join-status {
            font-size: clamp(12px, 3vw, 13px);
            color: var(--accent-gold);
            margin-top: 10px;
            min-height: 20px;
            text-align: center;
        }
        .waiting-list {
            margin-top: 30px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .waiting-title {
            font-size: clamp(13px, 3vw, 14px);
            color: var(--text-light);
            opacity: 0.7;
            margin-bottom: 10px;
        }
        .waiting-players {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .waiting-player {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: clamp(12px, 3vw, 14px);
            color: var(--text-light);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .waiting-player.host::after { content: ' (房主)'; color: var(--accent-gold); font-size: 12px; }
        .start-game-btn {
            margin-top: 24px;
            padding: 12px 40px;
            font-size: clamp(14px, 3vw, 16px);
            font-weight: 700;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Sans SC', sans-serif;
            box-shadow: 0 4px 15px rgba(39,174,96,0.3);
        }
        .start-game-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(39,174,96,0.5); }
        .start-game-btn.hidden { display: none; }

        /* 游戏容器 */
        .game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: radial-gradient(ellipse at center, var(--bg-table) 0%, var(--bg-primary) 100%);
            display: flex;
            flex-direction: column;
        }
        .game-container.hidden { display: none; }
        .table-texture {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.02) 0%, transparent 50%),
                             radial-gradient(circle at 80% 70%, rgba(255,255,255,0.02) 0%, transparent 50%);
            pointer-events: none;
        }

        /* 顶部栏 */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
        }
        .game-title {
            font-size: clamp(18px, 4vw, 22px);
            font-weight: 900;
            color: var(--accent-gold);
            text-shadow: 2px 2px 4px var(--shadow);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .top-info {
            display: flex;
            gap: clamp(12px, 3vw, 24px);
            align-items: center;
        }
        .info-item {
            font-size: clamp(12px, 3vw, 14px);
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .info-value {
            font-size: clamp(16px, 4vw, 18px);
            font-weight: 700;
            color: var(--accent-gold);
        }
        .conn-status {
            font-size: clamp(10px, 2vw, 12px);
            color: var(--accent-green);
        }

        /* 游戏主区域 */
        .game-area {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 80px 20px 140px;
        }

        /* 圆形布局（电脑端） */
        .players-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vmin;
            height: 80vmin;
            max-width: 600px;
            max-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 垂直布局（手机端） */
        .players-vertical {
            display: none;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            width: 100%;
            padding: 10px;
        }

        /* 玩家座位基础样式 */
        .seat {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }
        .seat.active .player-info {
            box-shadow: 0 0 20px var(--accent-gold);
        }

        /* 圆形布局中的座位位置 */
        .players-circle .seat-0 {
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        .players-circle .seat-1 {
            bottom: 30%;
            left: 0;
            transform: translateY(50%);
        }
        .players-circle .seat-2 {
            top: 30%;
            left: 0;
            transform: translateY(-50%);
        }
        .players-circle .seat-3 {
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        .players-circle .seat-4 {
            top: 30%;
            right: 0;
            transform: translateY(-50%);
        }
        .players-circle .seat-5 {
            bottom: 30%;
            right: 0;
            transform: translateY(50%);
        }

        /* 玩家信息框 */
        .player-info {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 10px 15px;
            text-align: center;
            min-width: var(--player-info-width);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
        }
        .player-info.winner { border-color: var(--accent-gold); background: rgba(244,208,63,0.2); }
        .player-info.dealer { border-color: var(--accent-orange); }
        .player-info.has-looked { border-color: var(--accent-purple); background: rgba(155,89,182,0.15); }
        .player-info.folded { opacity: 0.5; }

        /* 玩家名称和筹码 */
        .player-name {
            font-size: clamp(12px, 3vw, 14px);
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100px;
        }
        .player-chips {
            font-size: clamp(16px, 4vw, 18px);
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .player-chips.positive { color: var(--accent-green); }
        .player-chips.negative { color: var(--accent-red); }
        .player-chips.zero { color: var(--text-light); }
        .player-status {
            font-size: clamp(10px, 2vw, 12px);
            color: var(--accent-orange);
            margin-top: 5px;
            min-height: 18px;
        }
        .bet-info {
            font-size: clamp(10px, 2vw, 11px);
            color: var(--accent-purple);
            margin-top: 3px;
            min-height: 14px;
        }

        /* 卡牌容器 */
        .cards-container {
            display: flex;
            gap: var(--gap-size);
            margin-top: 10px;
            justify-content: center;
            position: relative;
        }

        /* 卡牌样式 */
        .card {
            width: var(--card-size);
            height: var(--card-height);
            background: var(--card-white);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            box-shadow: 0 4px 8px var(--shadow);
            position: relative;
            transition: transform 0.6s ease;
            cursor: pointer;
            flex-shrink: 0;
        }
        .card:hover { transform: translateY(-5px); }
        .card.red { color: #e74c3c !important; }
        .card.black { color: #2c3e50 !important; }
        .card-back {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            position: relative;
            overflow: hidden;
        }
        .card-back::before {
            content: '';
            position: absolute;
            inset: 5px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 4px;
        }
        .card-back::after {
            content: '♠';
            font-size: 24px;
            color: rgba(255,255,255,0.3);
        }
        .card-front {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .card.flipped .card-back { display: none !important; }
        .card.flipped .card-front { display: flex !important; }
        .card-rank { font-size: clamp(18px, 4vw, 22px); line-height: 1; font-weight: 700; }
        .card-suit { font-size: clamp(22px, 5vw, 26px); line-height: 1; }
        .card-small {
            position: absolute;
            top: 4px;
            left: 6px;
            font-size: clamp(9px, 2vw, 11px);
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
        }
        .card-small .card-suit { font-size: clamp(8px, 2vw, 10px); }

        /* 操作面板 */
        .action-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 50;
            flex-wrap: wrap;
            justify-content: center;
            width: 90%;
            max-width: 500px;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: var(--border-radius);
            backdrop-filter: blur(10px);
        }
        .action-panel.hidden { display: none !important; }
        .action-btn {
            padding: var(--action-btn-padding);
            font-size: var(--action-btn-size);
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 1px;
            font-family: 'Noto Sans SC', sans-serif;
            flex: 1;
            min-width: 80px;
        }
        .action-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--shadow);
        }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-fold { background: var(--accent-red); color: white; }
        .btn-look { background: var(--accent-purple); color: white; }
        .btn-call { background: var(--accent-blue); color: white; }
        .btn-raise { background: var(--accent-gold); color: var(--text-dark); }
        .btn-compare { background: #1abc9c; color: white; }

        /* 回合指示器 */
        .round-indicator {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 20px;
            color: var(--text-light);
            font-weight: 700;
            font-size: clamp(12px, 3vw, 14px);
            text-align: center;
            max-width: 90%;
        }

        /* 操作记录面板 */
        .action-log-panel {
            position: absolute;
            top: 70px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: var(--border-radius);
            color: var(--text-light);
            font-size: clamp(11px, 2vw, 12px);
            width: clamp(180px, 25vw, 220px);
            max-height: 200px;
            z-index: 50;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .action-log-title {
            font-size: clamp(13px, 3vw, 14px);
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 10px;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-toggle {
            background: none;
            border: none;
            color: var(--accent-gold);
            cursor: pointer;
            font-size: 16px;
            padding: 0;
        }
        .action-log-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }
        .action-log-container::-webkit-scrollbar { width: 4px; }
        .action-log-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 2px; }
        .action-log-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
        .action-log-entry {
            margin-bottom: 5px;
            line-height: 1.4;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }
        .action-log-entry:last-child { border-bottom: none; }

        /* 游戏消息 */
        .message-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
            pointer-events: none;
            width: 90%;
        }
        .game-message {
            font-size: clamp(24px, 6vw, 28px);
            font-weight: 900;
            color: var(--accent-gold);
            text-shadow: 2px 2px 8px var(--shadow);
            opacity: 0;
            transition: opacity 0.3s ease;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: var(--border-radius);
            display: inline-block;
        }
        .game-message.show { opacity: 1; }

        /* 重新开始按钮 */
        .restart-btn {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 40px;
            font-size: clamp(16px, 4vw, 18px);
            font-weight: 700;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            z-index: 300;
            transition: all 0.3s;
            font-family: 'Noto Sans SC', sans-serif;
            box-shadow: 0 4px 20px rgba(39,174,96,0.3);
        }
        .restart-btn:hover {
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 8px 30px rgba(39,174,96,0.5);
        }
        .restart-btn.hidden { display: none; }

        /* 比较模态框 */
        .compare-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }
        .compare-modal.show { display: flex; }
        .compare-content {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 90%;
            width: 400px;
        }
        .compare-title {
            font-size: clamp(18px, 4vw, 22px);
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 20px;
        }
        .compare-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .compare-option {
            padding: 15px 25px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 10px;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: clamp(14px, 3vw, 15px);
            flex: 1;
            min-width: 120px;
        }
        .compare-option:hover { border-color: var(--accent-gold); background: rgba(244,208,63,0.2); }
        .compare-cancel {
            margin-top: 20px;
            padding: 10px 30px;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: clamp(14px, 3vw, 15px);
        }

        /* 动画 */
        @keyframes dealCard {
            0%{transform:translateY(-200px) rotate(-20deg);opacity:0}
            100%{transform:translateY(0) rotate(0);opacity:1}
        }
        .card.dealing { animation: dealCard 0.4s ease forwards; }
        @keyframes flipCard {
            0%{transform:rotateY(0deg)}
            50%{transform:rotateY(90deg)}
            100%{transform:rotateY(0deg)}
        }
        .card.flipping { animation: flipCard 0.5s ease; }
        @keyframes winPulse {
            0%,100%{transform:scale(1)}
            50%{transform:scale(1.1)}
        }
        .winner-anim { animation: winPulse 0.5s ease 3; }

        /* 徽章 */
        .dealer-badge {
            position: absolute;
            top: -10px;
            left: -10px;
            background: var(--accent-orange);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            z-index: 10;
        }
        .looked-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--accent-purple);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(155,89,182,0.5);
            animation: pulse 2s infinite;
        }
        .baoxi-badge {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-orange);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(230,126,34,0.5);
            animation: pulse 2s infinite;
        }
        .huoxi-badge {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-gold);
            color: var(--text-dark);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(244,208,63,0.5);
        }
        @keyframes pulse {
            0%,100%{transform:scale(1)}
            50%{transform:scale(1.05)}
        }

        /* 响应式设计 - 手机端 */
        @media (max-width: 768px) {
            :root {
                --card-size: 45px;
                --card-height: 63px;
                --player-info-width: 90px;
                --action-btn-size: 13px;
                --action-btn-padding: 8px 16px;
                --gap-size: 6px;
                --border-radius: 10px;
            }

            .top-bar {
                height: 50px;
                padding: 0 15px;
            }

            .game-area {
                padding: 60px 10px 160px;
            }

            /* 切换为垂直布局 */
            .players-circle {
                display: none;
            }

            .players-vertical {
                display: flex;
            }

            /* 调整操作面板位置 */
            .action-panel {
                bottom: 10px;
                padding: 10px;
                gap: 8px;
            }

            /* 调整操作记录面板 */
            .action-log-panel {
                top: 60px;
                right: 10px;
                width: 180px;
                max-height: 150px;
                font-size: 11px;
            }

            .round-indicator {
                top: 60px;
                font-size: 12px;
                padding: 6px 15px;
            }

            .restart-btn {
                bottom: 120px;

            }

            .compare-content {

        /* 响应式设计 - 小手机 */
        @media (max-width: 480px) {
            :root {
                --card-size: 40px;
                --card-height: 56px;
                --player-info-width: 80px;

        /* 响应式设计 - 平板 */

    <script src="/socket.io/socket.io.js"></script>
    <script>
    (function() {
        var socket = null;
        var myIndex = -1;
        var gameState = null;
        var mySocketId = null;
        var isMobile = window.innerWidth <= 768;

        var $ = function(id) { return document.getElementById(id); };
        var joinScreen    = $('joinScreen');
        var gameContainer = $('gameContainer');
        var nameInput     = $('nameInput');
        var joinBtn       = $('joinBtn');
        var joinStatus    = $('joinStatus');
        var waitingList   = $('waitingList');
        var waitingPlayers= $('waitingPlayers');
        var startBtn      = $('startBtn');
        var restartBtn    = $('restartBtn');
        var actionPanel   = $('actionPanel');
        var compareModal  = $('compareModal');
        var compareOptions= $('compareOptions');
        var logToggle     = $('logToggle');
        var actionLogContainer = $('actionLogContainer');

        // 监听窗口大小变化，更新布局
        window.addEventListener('resize', function() {
            isMobile = window.innerWidth <= 768;
            if (gameState) {
                renderState(gameState);
            }
        });

        // 日志面板折叠功能
        logToggle.addEventListener('click', function() {
            var container = actionLogContainer;
            if (container.style.display === 'none') {
                container.style.display = 'block';
                logToggle.textContent = '▼';
            } else {
                container.style.display = 'none';
                logToggle.textContent = '▶';
            }
        });

        joinBtn.onclick = doJoin;
        nameInput.onkeydown = function(e) { if (e.key === 'Enter') doJoin(); };

        function doJoin() {
            var name = nameInput.value.trim();
            if (!name) { nameInput.focus(); return; }
            joinBtn.disabled = true;
            joinStatus.textContent = '连接中（首次可能需要等待约30秒）...';

            socket = io({
                reconnection: true,
                reconnectionDelay: 2000,
                reconnectionAttempts: 10
            });
            setupSocketEvents();

            socket.on('connect', function() {
                mySocketId = socket.id;
                joinStatus.textContent = '已连接，加入房间...';
                socket.emit('join', { name: name, room: 'main' });
            });

            socket.on('connect_error', function() {
                joinStatus.textContent = '连接中...（服务器唤醒中，请耐心等待）';
            });
        }

        function setupSocketEvents() {
            socket.on('error_msg', function(msg) {
                joinStatus.textContent = msg;
                joinBtn.disabled = false;

                if (!gameContainer.classList.contains('hidden')) {
                    showMessage(msg);
                    if (msg.indexOf('开始') !== -1 || msg.indexOf('房主') !== -1) {
                        setTimeout(function() { restartBtn.classList.remove('hidden'); }, 2000);
                    }
                }
            });

            socket.on('joined', function(data) {
                myIndex = data.playerIndex;
                joinStatus.textContent = '已加入，等待中...';
            });

            socket.on('waiting', function(data) {
                waitingList.style.display = 'block';
                waitingPlayers.innerHTML = '';
                var iAmHost = false;
                data.players.forEach(function(p) {
                    var div = document.createElement('div');
                    div.className = 'waiting-player' + (p.isHost ? ' host' : '');
                    div.textContent = p.name;
                    waitingPlayers.appendChild(div);
                    if (p.isHost) iAmHost = true;
                });
                if (data.players.length >= 2 && iAmHost) startBtn.classList.remove('hidden');
                else startBtn.classList.add('hidden');
            });

            startBtn.onclick = function() { socket.emit('start_game'); };

            socket.on('game_started', function() {
                joinScreen.classList.add('hidden');
                gameContainer.classList.remove('hidden');
                restartBtn.classList.add('hidden');
                clearLog();
                addLogEntry('系统', '游戏开始！', 'call', 0);
            });

            socket.on('state_update', function(state) {
                gameState = state;
                renderState(state);
            });

            socket.on('your_cards', function(data) {
                if (myIndex >= 0) {
                    flipMyCards(myIndex, data.cards);
                }
            });

            socket.on('player_looked', function(data) {
                if (data.playerIndex !== myIndex) {
                    flipOtherCards(data.playerIndex);
                }
                if (gameState && gameState.players[data.playerIndex]) {
                    showMessage(gameState.players[data.playerIndex].name + ' 看了牌');
                }
            });

            socket.on('compare_result', function(data) {
                var wName = gameState ? gameState.players[data.winner].name : '?';
                var lName = gameState ? gameState.players[data.loser].name : '?';
                showMessage(wName + ' 敲牌赢了 ' + lName + '！');
            });

            socket.on('game_over', function(data) {
                showMessage(data.winnerName + ' 赢了 ' + data.pot + ' 筹码！');
                addLogEntry(data.winnerName, '赢得 ' + data.pot + ' 筹码（' + data.handDesc + '）', 'call', 0);
                setTimeout(function() {
                    restartBtn.classList.remove('hidden');
                }, 3000);
            });

            restartBtn.onclick = function() {
                restartBtn.classList.add('hidden');
                socket.emit('start_game');
            };

            socket.on('log', function(data) {
                addLogEntry(data.name, data.action, data.type, data.round);
            });

            socket.on('disconnect', function() {
                $('connStatus').textContent = '● 已断开';
                $('connStatus').style.color = '#e74c3c';
            });

            socket.on('reconnect', function() {
                mySocketId = socket.id;
                $('connStatus').textContent = '● 已连接';
                $('connStatus').style.color = '#27ae60';
                socket.emit('join', { name: nameInput.value.trim(), room: 'main' });
            });
        }

        // ==================== 渲染 ====================

        function renderState(state) {
            $('potAmount').textContent = state.pot;
            $('baseBetDisplay').textContent = state.baseBet;

            if (state.phase === 'playing' && state.currentPlayerIndex >= 0 && state.players[state.currentPlayerIndex]) {
                var cp = state.players[state.currentPlayerIndex];
                var bi = cp.hasLooked ? '(明牌)' : '(暗牌)';
                var isMe = state.currentPlayerIndex === state.myIndex;
                $('roundIndicator').textContent = '第' + state.round + '轮 - ' + cp.name + '的回合 ' + bi + (isMe ? ' ← 你' : '');
            } else {
                var phases = { waiting: '等待中', playing: '游戏中', gameover: '游戏结束' };
                $('roundIndicator').textContent = phases[state.phase] || '准备中';
            }

            // 根据设备类型选择布局
            if (isMobile) {
                renderMobilePlayers(state);
            } else {
                renderDesktopPlayers(state);
            }

            // 渲染操作面板
            if (state.phase === 'playing' && state.currentPlayerIndex === state.myIndex && state.availableActions.length > 0) {
                renderActionPanel(state.availableActions, state.compareTargets);
            } else {
                actionPanel.classList.add('hidden');
            }
        }

        function renderDesktopPlayers(state) {
            for (var i = 0; i < 6; i++) {
                if (i < state.players.length) {
                    $('seat' + i).style.display = 'flex';
                    renderPlayerSlot(i, state.players[i], state);
                } else {
                    $('seat' + i).style.display = 'none';
                }
            }

            for (var i = 0; i < 6; i++) $('seat' + i).classList.remove('active');
            if (state.phase === 'playing' && state.currentPlayerIndex >= 0)
                $('seat' + state.currentPlayerIndex).classList.add('active');
        }

        function renderMobilePlayers(state) {
            var container = $('playersVertical');
            container.innerHTML = '';

            for (var i = 0; i < state.players.length; i++) {
                var player = state.players[i];
                var seatDiv = document.createElement('div');
                seatDiv.className = 'seat';
                seatDiv.id = 'mobileSeat' + i;

                // 玩家信息
                var infoDiv = document.createElement('div');
                infoDiv.className = 'player-info';
                infoDiv.id = 'mobilePlayerInfo' + i;

                var nameDiv = document.createElement('div');
                nameDiv.className = 'player-name';
                nameDiv.id = 'mobileName' + i;
                nameDiv.textContent = player.name + (i === state.myIndex ? ' (你)' : '');

                var chipsDiv = document.createElement('div');
                chipsDiv.className = 'player-chips zero';
                chipsDiv.id = 'mobileChips' + i;
                chipsDiv.textContent = player.chips;

                var statusDiv = document.createElement('div');
                statusDiv.className = 'player-status';
                statusDiv.id = 'mobileStatus' + i;

                var betDiv = document.createElement('div');
                betDiv.className = 'bet-info';
                betDiv.id = 'mobileBetInfo' + i;

                infoDiv.appendChild(nameDiv);
                infoDiv.appendChild(chipsDiv);
                infoDiv.appendChild(statusDiv);
                infoDiv.appendChild(betDiv);

                // 卡牌容器
                var cardsDiv = document.createElement('div');
                cardsDiv.className = 'cards-container';
                cardsDiv.id = 'mobileCards' + i;

                seatDiv.appendChild(infoDiv);
                seatDiv.appendChild(cardsDiv);
                container.appendChild(seatDiv);

                // 渲染玩家数据
                renderMobilePlayerSlot(i, player, state);
            }

            // 高亮当前玩家
            for (var i = 0; i < state.players.length; i++) {
                var seat = $('mobileSeat' + i);
                if (seat) {
                    seat.classList.remove('active');
                    if (state.phase === 'playing' && state.currentPlayerIndex === i) {
                        seat.classList.add('active');
                    }
                }
            }
        }

        function renderPlayerSlot(index, player, state) {
            var info = $('playerInfo' + index);
            var isMe = index === state.myIndex;

            $('name' + index).textContent = player.name + (isMe ? ' (你)' : '');

            var chipsEl = $('chips' + index);
            chipsEl.textContent = player.chips;
            chipsEl.classList.remove('positive', 'negative', 'zero');
            chipsEl.classList.add(player.chips > 0 ? 'positive' : player.chips < 0 ? 'negative' : 'zero');

            $('status' + index).textContent = player.status === 'folded' ? '已弃牌' : '';

            var betText = '';
            if (player.bet > 0) betText = '下注: ' + player.bet;
            if (player.handDesc && (player.hasLooked || state.phase === 'gameover'))
                betText += (betText ? ' | ' : '') + player.handDesc;
            $('betInfo' + index).textContent = betText;

            info.classList.toggle('folded', player.status === 'folded');
            info.classList.toggle('has-looked', player.hasLooked);

            // 清除旧徽章
            var badges = info.querySelectorAll('.dealer-badge, .looked-badge, .baoxi-badge');
            badges.forEach(function(badge) { badge.remove(); });
            info.classList.remove('dealer', 'winner', 'winner-anim');

            // 添加庄家徽章
            if (index === state.dealerIndex) {
                info.classList.add('dealer');
                var badge = document.createElement('div');
                badge.className = 'dealer-badge';
                badge.textContent = '庄';
                info.appendChild(badge);
            }

            // 添加看牌徽章
            if (player.hasLooked && player.status !== 'folded') {
                var lookedBadge = document.createElement('div');
                lookedBadge.className = 'looked-badge';
                lookedBadge.textContent = '已看牌';
                info.appendChild(lookedBadge);
            }

            // 添加报喜徽章
            if (player.baoxi) {
                var baoxiBadge = document.createElement('div');
                baoxiBadge.className = 'baoxi-badge';
                baoxiBadge.textContent = '报喜';
                info.appendChild(baoxiBadge);
            }

            renderCardsForPlayer(index, player, state);
        }

        function renderMobilePlayerSlot(index, player, state) {
            var info = $('mobilePlayerInfo' + index);
            var isMe = index === state.myIndex;

            $('mobileName' + index).textContent = player.name + (isMe ? ' (你)' : '');

            var chipsEl = $('mobileChips' + index);
            chipsEl.textContent = player.chips;
            chipsEl.classList.remove('positive', 'negative', 'zero');
            chipsEl.classList.add(player.chips > 0 ? 'positive' : player.chips < 0 ? 'negative' : 'zero');

            $('mobileStatus' + index).textContent = player.status === 'folded' ? '已弃牌' : '';

            var betText = '';
            if (player.bet > 0) betText = '下注: ' + player.bet;
            if (player.handDesc && (player.hasLooked || state.phase === 'gameover'))
                betText += (betText ? ' | ' : '') + player.handDesc;
            $('mobileBetInfo' + index).textContent = betText;

            info.classList.toggle('folded', player.status === 'folded');
            info.classList.toggle('has-looked', player.hasLooked);

            // 清除旧徽章
            var badges = info.querySelectorAll('.dealer-badge, .looked-badge, .baoxi-badge');
            badges.forEach(function(badge) { badge.remove(); });
            info.classList.remove('dealer', 'winner', 'winner-anim');

            // 添加庄家徽章
            if (index === state.dealerIndex) {
                info.classList.add('dealer');
                var badge = document.createElement('div');
                badge.className = 'dealer-badge';
                badge.textContent = '庄';
                info.appendChild(badge);
            }

            // 添加看牌徽章
            if (player.hasLooked && player.status !== 'folded') {
                var lookedBadge = document.createElement('div');
                lookedBadge.className = 'looked-badge';
                lookedBadge.textContent = '已看牌';
                info.appendChild(lookedBadge);
            }

            // 添加报喜徽章
            if (player.baoxi) {
                var baoxiBadge = document.createElement('div');
                baoxiBadge.className = 'baoxi-badge';
                baoxiBadge.textContent = '报喜';
                info.appendChild(baoxiBadge);
            }

            renderMobileCardsForPlayer(index, player, state);
        }

        function renderCardsForPlayer(index, player, state) {
            var container = $('cards' + index);
            container.innerHTML = '';

            if (player.cards && player.cards.length === 3) {
                player.cards.forEach(function(card) {
                    var cardEl = createCardElement(card);
                    if (player.status === 'folded') cardEl.style.opacity = '0.5';
                    container.appendChild(cardEl);
                });
                if (state.phase === 'gameover' && player.handDesc && player.status !== 'folded') {
                    var tl = document.createElement('div');
                    tl.className = 'hand-type';
                    tl.textContent = player.handDesc;
                    container.appendChild(tl);
                }
            } else {
                if (player.status !== 'folded' || state.phase === 'playing') {
                    for (var i = 0; i < 3; i++) {
                        var cardEl = document.createElement('div');
                        cardEl.className = 'card card-back';
                        container.appendChild(cardEl);
                    }
                }
            }
        }

        function renderMobileCardsForPlayer(index, player, state) {
            var container = $('mobileCards' + index);
            container.innerHTML = '';

            if (player.cards && player.cards.length === 3) {
                player.cards.forEach(function(card) {
                    var cardEl = createCardElement(card);
                    if (player.status === 'folded') cardEl.style.opacity = '0.5';
                    container.appendChild(cardEl);
                });
                if (state.phase === 'gameover' && player.handDesc && player.status !== 'folded') {
                    var tl = document.createElement('div');
                    tl.className = 'hand-type';
                    tl.textContent = player.handDesc;
                    container.appendChild(tl);
                }
            } else {
                if (player.status !== 'folded' || state.phase === 'playing') {
                    for (var i = 0; i < 3; i++) {
                        var cardEl = document.createElement('div');
                        cardEl.className = 'card card-back';
                        container.appendChild(cardEl);
                    }
                }
            }
        }

        function createCardElement(card) {
            var cardEl = document.createElement('div');
            var isRed = card.suit === '♥' || card.suit === '♦';
            cardEl.className = 'card flipped ' + (isRed ? 'red' : 'black');
            cardEl.innerHTML = '<div class="card-front">' +
                '<div class="card-small"><span>' + card.rank + '</span><span class="card-suit">' + card.suit + '</span></div>' +
                '<span class="card-rank">' + card.rank + '</span>' +
                '<span class="card-suit">' + card.suit + '</span></div>';
            return cardEl;
        }

        function flipMyCards(playerIndex, cards) {
            var containerId = isMobile ? 'mobileCards' + playerIndex : 'cards' + playerIndex;
            var container = $(containerId);
            var cardEls = container.querySelectorAll('.card');

            if (cardEls.length === 0) {
                container.innerHTML = '';
                cards.forEach(function(card) {
                    var el = document.createElement('div');
                    el.className = 'card card-back';
                    container.appendChild(el);
                });
                cardEls = container.querySelectorAll('.card');
            }

            cardEls.forEach(function(cardEl, idx) {
                if (idx >= cards.length) return;
                var card = cards[idx];
                var isRed = card.suit === '♥' || card.suit === '♦';

                setTimeout(function() {
                    cardEl.classList.add('flipping');
                    setTimeout(function() {
                        cardEl.classList.remove('card-back', 'flipping');
                        cardEl.classList.add('flipped', isRed ? 'red' : 'black');
                        cardEl.innerHTML = '<div class="card-front">' +
                            '<div class="card-small"><span>' + card.rank + '</span><span class="card-suit">' + card.suit + '</span></div>' +
                            '<span class="card-rank">' + card.rank + '</span>' +
                            '<span class="card-suit">' + card.suit + '</span></div>';
                    }, 250);
                }, idx * 150);
            });
        }

        function flipOtherCards(playerIndex) {
            var containerId = isMobile ? 'mobileCards' + playerIndex : 'cards' + playerIndex;
            var cardEls = $(containerId).querySelectorAll('.card');
            cardEls.forEach(function(cardEl, idx) {
                setTimeout(function() {
                    cardEl.classList.add('flipping');
                    setTimeout(function() {
                        cardEl.classList.remove('flipping');
                    }, 500);
                }, idx * 150);
            });
        }

        // ==================== 操作面板 ====================

        var ACTION_CONFIG = {
            fold:    { label: '弃牌', cls: 'btn-fold' },
            look:    { label: '看牌', cls: 'btn-look' },
            call:    { label: '跟注', cls: 'btn-call' },
            raise:   { label: '加注', cls: 'btn-raise' },
            compare: { label: '敲牌', cls: 'btn-compare' }
        };

        function renderActionPanel(actions, compareTargets) {
            actionPanel.innerHTML = '';
            actionPanel.classList.remove('hidden');

            var baseBet = gameState.baseBet;
            var hasLooked = gameState.players[gameState.myIndex].hasLooked;
            var callAmount = hasLooked ? baseBet * 2 : baseBet;
            var raiseAmount = hasLooked ? baseBet * 4 : baseBet * 2;

            actions.forEach(function(action) {
                var cfg = ACTION_CONFIG[action];
                if (!cfg) return;

                var btn = document.createElement('button');
                btn.className = 'action-btn ' + cfg.cls;

                var label = cfg.label;
                if (action === 'call') label = '跟注 ' + callAmount;
                else if (action === 'raise') label = '加注 ' + raiseAmount;
                else if (action === 'compare') label = '敲牌 ' + callAmount;

                btn.textContent = label;

                if (action === 'compare' && compareTargets && compareTargets.length > 1) {
                    btn.onclick = function() { showCompareModal(compareTargets); };
                } else if (action === 'compare') {
                    btn.onclick = function() { socket.emit('action', { action: 'compare', target: compareTargets[0] }); };
                } else {
                    btn.onclick = function() { socket.emit('action', { action: action }); };
                }

                actionPanel.appendChild(btn);
            });
        }

        function showCompareModal(targets) {
            compareOptions.innerHTML = '';
            targets.forEach(function(t) {
                var name = gameState && gameState.players[t] ? gameState.players[t].name : ('玩家' + t);
                var opt = document.createElement('div');
                opt.className = 'compare-option';
                opt.textContent = name;
                opt.onclick = function() {
                    compareModal.classList.remove('show');
                    socket.emit('action', { action: 'compare', target: t });
                };
                compareOptions.appendChild(opt);
            });
            compareModal.classList.add('show');
        }

        $('compareCancel').onclick = function() { compareModal.classList.remove('show'); };

        // ==================== 消息 ====================

        var msgTimer = null;
        function showMessage(text) {
            var m = $('gameMessage');
            m.textContent = text;
            m.classList.add('show');
            clearTimeout(msgTimer);
            msgTimer = setTimeout(function() { m.classList.remove('show'); }, 2500);
        }

        // ==================== 日志 ====================

        function addLogEntry(name, action, type, round) {
            var entry = document.createElement('div');
            entry.className = 'action-log-entry';
            entry.innerHTML = '<span class="log-player-name">' + name + '</span> ' +
                '<span class="log-action ' + (type || '') + '">' + action + '</span>' +
                (round ? '<span class="log-round">第' + round + '轮</span>' : '');
            actionLogContainer.appendChild(entry);
            actionLogContainer.scrollTop = actionLogContainer.scrollHeight;
        }

        function clearLog() { actionLogContainer.innerHTML = ''; }
    })();
    </script>
</body>
</html>
