<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炸金花 - 联机版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #1a472a; --bg-secondary: #2d5a3d; --bg-table: #1e5631;
            --accent-gold: #f4d03f; --accent-orange: #e67e22; --accent-red: #e74c3c;
            --accent-blue: #3498db; --accent-green: #27ae60; --accent-purple: #9b59b6;
            --text-light: #ecf0f1; --text-dark: #2c3e50; --card-white: #ffffff;
            --shadow: rgba(0,0,0,0.3);
            --font-base: clamp(14px, 2.5vmin, 18px); /* 响应式基础字体大小 */
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            font-size: var(--font-base);
        }

        .join-screen {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, var(--bg-table) 0%, var(--bg-primary) 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
            padding: 2rem;
        }
        .join-screen.hidden { display: none; }
        .join-title {
            font-size: clamp(2rem, 8vmin, 3rem);
            font-weight: 900;
            color: var(--accent-gold);
            text-shadow: 2px 2px 8px var(--shadow);
            margin-bottom: 0.5rem;
        }
        .join-subtitle {
            font-size: clamp(0.8rem, 2.5vmin, 1rem);
            color: var(--text-light);
            opacity: 0.6;
            margin-bottom: 2.5rem;
        }
        .join-form {
            display: flex; flex-direction: column; gap: 1rem; align-items: center;
            width: 100%;
            max-width: 300px;
        }
        .join-input {
            width: 100%;
            padding: 0.875rem 1.25rem;
            font-size: 1rem;
            font-family: 'Noto Sans SC', sans-serif;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 0.625rem;
            background: rgba(255,255,255,0.1);
            color: var(--text-light);
            outline: none;
            text-align: center;
            transition: border-color 0.3s;
        }
        .join-input:focus { border-color: var(--accent-gold); }
        .join-input::placeholder { color: rgba(255,255,255,0.3); }
        .join-btn {
            width: 100%;
            padding: 0.875rem;
            font-size: 1.125rem;
            font-weight: 700;
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--accent-gold);
            color: var(--text-dark);
            border: none;
            border-radius: 0.625rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(244,208,63,0.3);
        }
        .join-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(244,208,63,0.5); }
        .join-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .join-status {
            font-size: 0.8125rem;
            color: var(--accent-gold);
            margin-top: 0.625rem;
            min-height: 1.25rem;
            text-align: center;
        }
        .waiting-list { margin-top: 1.875rem; text-align: center; width: 100%; }
        .waiting-title {
            font-size: 0.875rem;
            color: var(--text-light);
            opacity: 0.7;
            margin-bottom: 0.625rem;
        }
        .waiting-players {
            display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center;
        }
        .waiting-player {
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1rem;
            border-radius: 1.25rem;
            font-size: 0.875rem;
            color: var(--text-light);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .waiting-player.host::after { content: ' (房主)'; color: var(--accent-gold); font-size: 0.75rem; }
        .start-game-btn {
            margin-top: 1.5rem;
            padding: 0.75rem 2.5rem;
            font-size: 1rem;
            font-weight: 700;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 0.625rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Sans SC', sans-serif;
            box-shadow: 0 4px 15px rgba(39,174,96,0.3);
        }
        .start-game-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(39,174,96,0.5); }
        .start-game-btn.hidden { display: none; }

        .game-container {
            width: 100vw; height: 100vh;
            position: relative;
            background: radial-gradient(ellipse at center, var(--bg-table) 0%, var(--bg-primary) 100%);
            display: flex;
            flex-direction: column;
        }
        .game-container.hidden { display: none; }
        .table-texture {
            position: absolute; inset: 0;
            background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.02) 0%, transparent 50%),
                             radial-gradient(circle at 80% 70%, rgba(255,255,255,0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .top-bar {
            position: relative;
            height: clamp(3rem, 8vmin, 4rem);
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 clamp(1rem, 4vmin, 2rem);
            z-index: 100;
            flex-shrink: 0;
        }
        .game-title {
            font-size: clamp(1.1rem, 3.5vmin, 1.4rem);
            font-weight: 900;
            color: var(--accent-gold);
            text-shadow: 2px 2px 4px var(--shadow);
        }
        .top-info { display: flex; gap: clamp(0.5rem, 3vmin, 1.5rem); align-items: center; }
        .info-item {
            font-size: clamp(0.7rem, 2.2vmin, 0.9rem);
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }
        .info-value {
            font-size: clamp(0.9rem, 3vmin, 1.2rem);
            font-weight: 700;
            color: var(--accent-gold);
        }
        .conn-status {
            font-size: clamp(0.6rem, 1.8vmin, 0.8rem);
            color: var(--accent-green);
        }

        .table-area {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow: hidden;
        }

        .seats-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            height: 100%;
            max-height: 700px;
        }

        .seat {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
            z-index: 10;
        }
        .seat.active .player-info { box-shadow: 0 0 20px var(--accent-gold); }

        /* 桌面端座位布局 - 环绕牌桌 */
        .seat-0 { bottom: 5%; left: 50%; transform: translateX(-50%); }
        .seat-1 { bottom: 25%; left: 5%; }
        .seat-2 { bottom: 45%; left: 10%; }
        .seat-3 { top: 10%; left: 50%; transform: translateX(-50%); }
        .seat-4 { bottom: 45%; right: 10%; }
        .seat-5 { bottom: 25%; right: 5%; }

        .player-info {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 0.75rem;
            padding: 0.6rem 0.9rem;
            text-align: center;
            min-width: clamp(4rem, 12vmin, 7rem);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
        }
        .player-info.winner { border-color: var(--accent-gold); background: rgba(244,208,63,0.2); }
        .player-info.dealer { border-color: var(--accent-orange); }
        .player-info.has-looked { border-color: var(--accent-purple); background: rgba(155,89,182,0.15); }
        .player-info.folded { opacity: 0.5; }
        .dealer-badge {
            position: absolute; top: -0.6rem; left: -0.6rem; background: var(--accent-orange); color: white;
            width: 1.5rem; height: 1.5rem; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 0.75rem; font-weight: 700; z-index: 10;
        }
        .looked-badge {
            position: absolute; top: -0.6rem; right: -0.6rem; background: var(--accent-purple); color: white;
            padding: 0.25rem 0.6rem; border-radius: 0.75rem; font-size: 0.7rem; font-weight: 700; z-index: 10;
            box-shadow: 0 2px 8px rgba(155,89,182,0.5); animation: pulse 2s infinite;
        }
        .baoxi-badge {
            position: absolute; top: -0.6rem; left: 50%; transform: translateX(-50%);
            background: var(--accent-orange); color: white; padding: 0.25rem 0.6rem; border-radius: 0.75rem;
            font-size: 0.7rem; font-weight: 700; z-index: 10; box-shadow: 0 2px 8px rgba(230,126,34,0.5);
            animation: pulse 2s infinite;
        }
        .huoxi-badge {
            position: absolute; bottom: -1.6rem; left: 50%; transform: translateX(-50%);
            background: var(--accent-gold); color: var(--text-dark); padding: 0.25rem 0.6rem; border-radius: 0.75rem;
            font-size: 0.7rem; font-weight: 700; z-index: 10; box-shadow: 0 2px 8px rgba(244,208,63,0.5);
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        .player-name {
            font-size: clamp(0.7rem, 2.2vmin, 0.9rem);
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 0.3rem;
        }
        .player-chips {
            font-size: clamp(0.9rem, 3vmin, 1.2rem);
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .player-chips.positive { color: var(--accent-green); }
        .player-chips.negative { color: var(--accent-red); }
        .player-chips.zero { color: var(--text-light); }
        .player-status {
            font-size: clamp(0.6rem, 1.8vmin, 0.8rem);
            color: var(--accent-orange);
            margin-top: 0.3rem;
            min-height: 1.1rem;
        }
        .bet-info {
            font-size: clamp(0.55rem, 1.6vmin, 0.7rem);
            color: var(--accent-purple);
            margin-top: 0.2rem;
            min-height: 0.9rem;
        }

        .cards-container {
            display: flex; gap: 0.5rem; margin-top: 0.6rem; justify-content: center; position: relative;
        }
        .card {
            width: clamp(2.5rem, 8vmin, 4rem);
            height: clamp(3.5rem, 11vmin, 5.5rem);
            background: var(--card-white);
            border-radius: 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            box-shadow: 0 4px 8px var(--shadow);
            position: relative;
            transition: transform 0.6s ease;
            cursor: pointer;
        }
        .card:hover { transform: translateY(-0.3rem); }
        .card.red { color: #e74c3c !important; }
        .card.black { color: #2c3e50 !important; }
        .card-back { background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); position: relative; overflow: hidden; }
        .card-back::before { content: ''; position: absolute; inset: 0.3rem; border: 2px solid rgba(255,255,255,0.2); border-radius: 0.25rem; }
        .card-back::after { content: '♠'; font-size: clamp(1rem, 3vmin, 1.5rem); color: rgba(255,255,255,0.3); }
        .card-front { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .card.flipped .card-back { display: none !important; }
        .card.flipped .card-front { display: flex !important; }
        .card-rank { font-size: clamp(0.9rem, 3vmin, 1.4rem); line-height: 1; font-weight: 700; }
        .card-suit { font-size: clamp(1rem, 3.5vmin, 1.6rem); line-height: 1; }
        .card-small { position: absolute; top: 0.25rem; left: 0.4rem; font-size: clamp(0.5rem, 1.5vmin, 0.7rem); display: flex; flex-direction: column; align-items: center; line-height: 1; }
        .card-small .card-suit { font-size: 0.6rem; }
        .hand-type {
            position: absolute; bottom: -1.6rem; left: 50%; transform: translateX(-50%);
            background: var(--accent-orange); color: white; padding: 0.1rem 0.5rem; border-radius: 0.6rem;
            font-size: clamp(0.55rem, 1.6vmin, 0.7rem); font-weight: 700; white-space: nowrap;
        }

        .action-panel {
            position: relative;
            margin: 1rem auto;
            display: flex; gap: 0.75rem; z-index: 50; flex-wrap: wrap; justify-content: center;
            width: 90%;
            max-width: 600px;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 0.75rem;
            flex-shrink: 0;
        }
        .action-panel.hidden { display: none !important; }
        .action-btn {
            padding: 0.7rem 1.2rem;
            font-size: clamp(0.8rem, 2.5vmin, 1rem);
            font-weight: 700;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.06rem;
            font-family: 'Noto Sans SC', sans-serif;
            min-width: 5rem;
        }
        .action-btn:hover:not(:disabled) { transform: translateY(-0.2rem); box-shadow: 0 6px 20px var(--shadow); }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-fold { background: var(--accent-red); color: white; }
        .btn-look { background: var(--accent-purple); color: white; }
        .btn-call { background: var(--accent-blue); color: white; }
        .btn-raise { background: var(--accent-gold); color: var(--text-dark); }
        .btn-compare { background: #1abc9c; color: white; }

        .message-area {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 200; pointer-events: none;
            width: 90%;
        }
        .game-message {
            font-size: clamp(1.2rem, 4vmin, 1.8rem);
            font-weight: 900;
            color: var(--accent-gold);
            text-shadow: 2px 2px 8px var(--shadow);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .game-message.show { opacity: 1; }

        .round-indicator {
            position: absolute;
            top: clamp(4rem, 12vmin, 5rem);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            padding: 0.5rem 1.25rem;
            border-radius: 1.25rem;
            color: var(--text-light);
            font-weight: 700;
            font-size: clamp(0.7rem, 2.2vmin, 0.9rem);
            z-index: 50;
            white-space: nowrap;
        }

        .action-log-panel {
            position: absolute;
            top: clamp(4rem, 12vmin, 5rem);
            right: clamp(0.5rem, 2vmin, 1.25rem);
            background: rgba(0,0,0,0.6);
            padding: 0.9rem;
            border-radius: 0.6rem;
            color: var(--text-light);
            font-size: 0.75rem;
            width: clamp(8rem, 25vmin, 14rem);
            max-height: 12.5rem;
            z-index: 50;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .action-log-title {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 0.6rem;
            flex-shrink: 0;
        }
        .action-log-container { flex: 1; overflow-y: auto; padding-right: 0.3rem; }
        .action-log-container::-webkit-scrollbar { width: 0.25rem; }
        .action-log-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 0.1rem; }
        .action-log-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 0.1rem; }
        .action-log-entry { margin-bottom: 0.3rem; line-height: 1.4; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.3rem; }
        .action-log-entry:last-child { border-bottom: none; }
        .log-player-name { font-weight: 700; color: var(--accent-gold); }
        .log-action { color: var(--text-light); }
        .log-action.look { color: var(--accent-purple); }
        .log-action.fold { color: var(--accent-red); }
        .log-action.call { color: var(--accent-blue); }
        .log-action.raise { color: var(--accent-gold); }
        .log-action.compare { color: #1abc9c; }
        .log-action.baoxi { color: #e67e22; }
        .log-action.huoxi { color: #f4d03f; }
        .log-round { font-size: 0.7rem; color: rgba(255,255,255,0.5); margin-left: 0.3rem; }

        .compare-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 500;
            padding: 1rem;
        }
        .compare-modal.show { display: flex; }
        .compare-content {
            background: var(--bg-secondary);
            padding: clamp(1rem, 4vmin, 2rem);
            border-radius: 1rem;
            text-align: center;
            width: 90%;
            max-width: 300px;
        }
        .compare-title {
            font-size: clamp(1rem, 3.5vmin, 1.4rem);
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 1.25rem;
        }
        .compare-options {
            display: flex; gap: 0.9rem; flex-wrap: wrap; justify-content: center;
        }
        .compare-option {
            padding: 0.9rem 1.6rem;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 0.6rem;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: clamp(0.8rem, 2.5vmin, 1rem);
        }
        .compare-option:hover { border-color: var(--accent-gold); background: rgba(244,208,63,0.2); }
        .compare-cancel {
            margin-top: 1.25rem;
            padding: 0.6rem 1.9rem;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: clamp(0.8rem, 2.5vmin, 1rem);
        }

        .restart-btn {
            position: relative;
            margin: 0 auto 1rem;
            padding: 0.9rem 2.5rem;
            font-size: 1.125rem;
            font-weight: 700;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 0.6rem;
            cursor: pointer;
            z-index: 300;
            transition: all 0.3s;
            font-family: 'Noto Sans SC', sans-serif;
            box-shadow: 0 4px 20px rgba(39,174,96,0.3);
            flex-shrink: 0;
        }
        .restart-btn:hover { transform: translateY(-0.1rem); box-shadow: 0 8px 30px rgba(39,174,96,0.5); }
        .restart-btn.hidden { display: none; }

        @keyframes dealCard { 0%{transform:translateY(-12.5rem) rotate(-20deg);opacity:0} 100%{transform:translateY(0) rotate(0);opacity:1} }
        .card.dealing { animation: dealCard 0.4s ease forwards; }
        @keyframes flipCard { 0%{transform:rotateY(0deg)} 50%{transform:rotateY(90deg)} 100%{transform:rotateY(0deg)} }
        .card.flipping { animation: flipCard 0.5s ease; }
        @keyframes winPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        .winner-anim { animation: winPulse 0.5s ease 3; }

        /* 响应式布局 - 平板设备 */
        @media (max-width: 1024px) {
            .seats-container {
                max-width: 900px;
                max-height: 600px;
            }

            .seat-1 { left: 3%; }
            .seat-5 { right: 3%; }
            .seat-2 { left: 8%; }
            .seat-4 { right: 8%; }
        }

        /* 响应式布局 - 手机设备 */
        @media (max-width: 768px) {
            .table-area {
                padding: 0.5rem;
            }

            .seats-container {
                max-width: 100%;
                max-height: 100%;
                height: auto;
                min-height: 400px;
            }

            /* 手机端座位布局 - 简化排列 */
            .seat-0 { bottom: 2%; left: 50%; transform: translateX(-50%); }
            .seat-1 { bottom: 20%; left: 2%; }
            .seat-2 { bottom: 40%; left: 5%; }
            .seat-3 { top: 5%; left: 50%; transform: translateX(-50%); }
            .seat-4 { bottom: 40%; right: 5%; }
            .seat-5 { bottom: 20%; right: 2%; }

            .player-info {
                min-width: 3.5rem;
                padding: 0.4rem 0.6rem;
            }

            .card {
                width: 2.2rem;
                height: 3rem;
            }

            .card-rank { font-size: 0.8rem; }
            .card-suit { font-size: 1rem; }

            .action-btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.8rem;
                min-width: 4rem;
            }

            .action-panel {
                padding: 0.75rem;
                gap: 0.5rem;
                margin: 0.5rem auto;
            }

            .action-log-panel {
                display: none;
            }

            .round-indicator {
                top: 3.5rem;
                font-size: 0.7rem;
                padding: 0.3rem 0.8rem;
            }

            .compare-option {
                padding: 0.7rem 1.2rem;
            }
        }

        /* 响应式布局 - 小屏幕手机 */
        @media (max-width: 480px) {
            .join-title {
                font-size: 2rem;
            }

            .seats-container {
                min-height: 350px;
            }

            .seat-2, .seat-4 {
                bottom: 35%;
            }

            .player-info {
                min-width: 3rem;
                padding: 0.3rem 0.5rem;
            }

            .card {
                width: 1.8rem;
                height: 2.5rem;
            }

            .action-btn {
                padding: 0.4rem 0.6rem;
                font-size: 0.7rem;
                min-width: 3.5rem;
            }

            .action-panel {
                padding: 0.5rem;
                gap: 0.4rem;
            }
        }

        /* 响应式布局 - 大屏幕桌面 */
        @media (min-width: 1200px) {
            .seats-container {
                max-width: 1200px;
                max-height: 800px;
            }

            .seat-1 { left: 8%; }
            .seat-5 { right: 8%; }
            .seat-2 { left: 15%; }
            .seat-4 { right: 15%; }

            .action-panel {
                max-width: 700px;
            }
        }
    </style>
</head>
<body>

    <div class="join-screen" id="joinScreen">
        <div class="join-title">炸金花</div>
        <div class="join-subtitle">联机版 - 和朋友一起玩</div>
        <div class="join-form">
            <input type="text" class="join-input" id="nameInput" placeholder="输入昵称" maxlength="8" autocomplete="off">
            <button class="join-btn" id="joinBtn">加入房间</button>
        </div>
        <div class="join-status" id="joinStatus"></div>
        <div class="waiting-list" id="waitingList" style="display:none;">
            <div class="waiting-title">等待玩家中...</div>
            <div class="waiting-players" id="waitingPlayers"></div>
            <button class="start-game-btn hidden" id="startBtn">开始游戏</button>
        </div>
    </div>

    <div class="game-container hidden" id="gameContainer">
        <div class="table-texture"></div>
        <div class="top-bar">
            <div class="game-title">炸金花 <span class="conn-status" id="connStatus">● 已连接</span></div>
            <div class="top-info">
                <div class="info-item"><span>底注:</span><span class="info-value" id="baseBetDisplay">5</span></div>
                <div class="info-item"><span>总底池:</span><span class="info-value" id="potAmount">0</span></div>
            </div>
        </div>
        <div class="table-area">
            <div class="seats-container">
                <div class="round-indicator" id="roundIndicator">等待开始</div>
                <div class="action-log-panel" id="actionLogPanel">
                    <div class="action-log-title">操作记录</div>
                    <div class="action-log-container" id="actionLogContainer"></div>
                </div>

                <div class="seat seat-0" id="seat0">
                    <div class="player-info" id="playerInfo0">
                        <div class="player-name" id="name0">-</div>
                        <div class="player-chips zero" id="chips0">0</div>
                        <div class="player-status" id="status0"></div>
                        <div class="bet-info" id="betInfo0"></div>
                    </div>
                    <div class="cards-container" id="cards0"></div>
                </div>
                <div class="seat seat-1" id="seat1">
                    <div class="player-info" id="playerInfo1">
                        <div class="player-name" id="name1">-</div>
                        <div class="player-chips zero" id="chips1">0</div>
                        <div class="player-status" id="status1"></div>
                        <div class="bet-info" id="betInfo1"></div>
                    </div>
                    <div class="cards-container" id="cards1"></div>
                </div>
                <div class="seat seat-2" id="seat2">
                    <div class="player-info" id="playerInfo2">
                        <div class="player-name" id="name2">-</div>
                        <div class="player-chips zero" id="chips2">0</div>
                        <div class="player-status" id="status2"></div>
                        <div class="bet-info" id="betInfo2"></div>
                    </div>
                    <div class="cards-container" id="cards2"></div>
                </div>
                <div class="seat seat-3" id="seat3">
                    <div class="player-info" id="playerInfo3">
                        <div class="player-name" id="name3">-</div>
                        <div class="player-chips zero" id="chips3">0</div>
                        <div class="player-status" id="status3"></div>
                        <div class="bet-info" id="betInfo3"></div>
                    </div>
                    <div class="cards-container" id="cards3"></div>
                </div>
                <div class="seat seat-4" id="seat4">
                    <div class="player-info" id="playerInfo4">
                        <div class="player-name" id="name4">-</div>
                        <div class="player-chips zero" id="chips4">0</div>
                        <div class="player-status" id="status4"></div>
                        <div class="bet-info" id="betInfo4"></div>
                    </div>
                    <div class="cards-container" id="cards4"></div>
                </div>
                <div class="seat seat-5" id="seat5">
                    <div class="player-info" id="playerInfo5">
                        <div class="player-name" id="name5">-</div>
                        <div class="player-chips zero" id="chips5">0</div>
                        <div class="player-status" id="status5"></div>
                        <div class="bet-info" id="betInfo5"></div>
                    </div>
                    <div class="cards-container" id="cards5"></div>
                </div>
            </div>
        </div>

        <div class="action-panel hidden" id="actionPanel"></div>
        <button class="restart-btn hidden" id="restartBtn">再来一局</button>
        <div class="message-area"><div class="game-message" id="gameMessage"></div></div>

        <div class="compare-modal" id="compareModal">
            <div class="compare-content">
                <div class="compare-title">选择要敲牌的玩家</div>
                <div class="compare-options" id="compareOptions"></div>
                <button class="compare-cancel" id="compareCancel">取消</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
    (function() {
        var socket = null;
        var myIndex = -1;
        var gameState = null;
        var mySocketId = null;  // 【修复】记录自己的socket ID

        var $ = function(id) { return document.getElementById(id); };
        var joinScreen    = $('joinScreen');
        var gameContainer = $('gameContainer');
        var nameInput     = $('nameInput');
        var joinBtn       = $('joinBtn');
        var joinStatus    = $('joinStatus');
        var waitingList   = $('waitingList');
        var waitingPlayers= $('waitingPlayers');
        var startBtn      = $('startBtn');
        var restartBtn    = $('restartBtn');
        var actionPanel   = $('actionPanel');
        var compareModal  = $('compareModal');
        var compareOptions= $('compareOptions');

        joinBtn.onclick = doJoin;
        nameInput.onkeydown = function(e) { if (e.key === 'Enter') doJoin(); };

        function doJoin() {
            var name = nameInput.value.trim();
            if (!name) { nameInput.focus(); return; }
            joinBtn.disabled = true;
            joinStatus.textContent = '连接中（首次可能需要等待约30秒）...';

            socket = io({
                reconnection: true,
                reconnectionDelay: 2000,
                reconnectionAttempts: 10
            });
            setupSocketEvents();

            socket.on('connect', function() {
                mySocketId = socket.id;
                joinStatus.textContent = '已连接，加入房间...';
                socket.emit('join', { name: name, room: 'main' });
            });

            socket.on('connect_error', function() {
                joinStatus.textContent = '连接中...（服务器唤醒中，请耐心等待）';
            });
        }

        function setupSocketEvents() {
            socket.on('joined', function(data) {
                myIndex = data.playerIndex;
                joinStatus.textContent = '已加入，等待其他玩家...';
            });

            socket.on('waiting', function(data) {
                waitingList.style.display = 'block';
                waitingPlayers.innerHTML = '';
                var iAmHost = false;
                data.players.forEach(function(p) {
                    var div = document.createElement('div');
                    div.className = 'waiting-player' + (p.isHost ? ' host' : '');
                    div.textContent = p.name;
                    waitingPlayers.appendChild(div);
                    if (p.isHost) iAmHost = true;
                });
                if (data.players.length >= 2 && iAmHost) startBtn.classList.remove('hidden');
                else startBtn.classList.add('hidden');
            });

            startBtn.onclick = function() { socket.emit('start_game'); };

            socket.on('game_started', function() {
                joinScreen.classList.add('hidden');
                gameContainer.classList.remove('hidden');
                restartBtn.classList.add('hidden');
                clearLog();
                addLogEntry('系统', '游戏开始！', 'call', 0);
            });

            socket.on('state_update', function(state) {
                gameState = state;
                renderState(state);
            });

            // 【修复】只在看牌后接收自己的牌，用于翻牌动画
            socket.on('your_cards', function(data) {
                if (myIndex >= 0) {
                    flipMyCards(myIndex, data.cards);
                }
            });

            socket.on('player_looked', function(data) {
                // 其他玩家看牌：翻牌动画（显示牌背翻转效果）
                if (data.playerIndex !== myIndex) {
                    flipOtherCards(data.playerIndex);
                }
                if (gameState && gameState.players[data.playerIndex]) {
                    showMessage(gameState.players[data.playerIndex].name + ' 看了牌');
                }
            });

            socket.on('compare_result', function(data) {
                var wName = gameState ? gameState.players[data.winner].name : '?';
                var lName = gameState ? gameState.players[data.loser].name : '?';
                showMessage(wName + ' 敲牌赢了 ' + lName + '！');
            });

            socket.on('game_over', function(data) {
                showMessage(data.winnerName + ' 赢了 ' + data.pot + ' 筹码！');
                addLogEntry(data.winnerName, '赢得 ' + data.pot + ' 筹码（' + data.handDesc + '）', 'call', 0);
                // 【修复】3秒后给所有玩家显示再来一局按钮
                setTimeout(function() {
                    restartBtn.classList.remove('hidden');
                }, 3000);
            });

            restartBtn.onclick = function() {
                restartBtn.classList.add('hidden');
                socket.emit('start_game');
            };

            socket.on('log', function(data) {
                addLogEntry(data.name, data.action, data.type, data.round);
            });

            socket.on('error_msg', function(msg) {
                showMessage(msg);
                // 如果是开始游戏失败，重新显示按钮
                if (msg.indexOf('开始') !== -1 || msg.indexOf('房主') !== -1) {
                    setTimeout(function() { restartBtn.classList.remove('hidden'); }, 2000);
                }
            });

            socket.on('disconnect', function() {
                $('connStatus').textContent = '● 已断开';
                $('connStatus').style.color = '#e74c3c';
            });

            socket.on('reconnect', function() {
                mySocketId = socket.id;
                $('connStatus').textContent = '● 已连接';
                $('connStatus').style.color = '#27ae60';
                socket.emit('join', { name: nameInput.value.trim(), room: 'main' });
            });
        }

        // ==================== 渲染 ====================

        function renderState(state) {
            $('potAmount').textContent = state.pot;
            $('baseBetDisplay').textContent = state.baseBet;

            if (state.phase === 'playing' && state.currentPlayerIndex >= 0 && state.players[state.currentPlayerIndex]) {
                var cp = state.players[state.currentPlayerIndex];
                var bi = cp.hasLooked ? '(明牌)' : '(暗牌)';
                var isMe = state.currentPlayerIndex === state.myIndex;
                $('roundIndicator').textContent = '第' + state.round + '轮 - ' + cp.name + '的回合 ' + bi + (isMe ? ' ← 你' : '');
            } else {
                var phases = { waiting: '等待中', playing: '游戏中', gameover: '游戏结束' };
                $('roundIndicator').textContent = phases[state.phase] || '准备中';
            }

            for (var i = 0; i < 6; i++) {
                if (i < state.players.length) {
                    $('seat' + i).style.display = 'flex';
                    renderPlayerSlot(i, state.players[i], state);
                } else {
                    $('seat' + i).style.display = 'none';
                }
            }

            for (var i = 0; i < 6; i++) $('seat' + i).classList.remove('active');
            if (state.phase === 'playing' && state.currentPlayerIndex >= 0)
                $('seat' + state.currentPlayerIndex).classList.add('active');

            if (state.phase === 'playing' && state.currentPlayerIndex === state.myIndex && state.availableActions.length > 0) {
                renderActionPanel(state.availableActions, state.compareTargets);
            } else {
                actionPanel.classList.add('hidden');
            }
        }

        function renderPlayerSlot(index, player, state) {
            var info = $('playerInfo' + index);
            var isMe = index === state.myIndex;

            $('name' + index).textContent = player.name + (isMe ? ' (你)' : '');

            var chipsEl = $('chips' + index);
            chipsEl.textContent = player.chips;
            chipsEl.classList.remove('positive', 'negative', 'zero');
            chipsEl.classList.add(player.chips > 0 ? 'positive' : player.chips < 0 ? 'negative' : 'zero');

            $('status' + index).textContent = player.status === 'folded' ? '已弃牌' : '';

            var betText = '';
            if (player.bet > 0) betText = '下注: ' + player.bet;
            if (player.handDesc && (player.hasLooked || state.phase === 'gameover'))
                betText += (betText ? ' | ' : '') + player.handDesc;
            $('betInfo' + index).textContent = betText;

            info.classList.toggle('folded', player.status === 'folded');
            info.classList.toggle('has-looked', player.hasLooked);

            var badge = info.querySelector('.dealer-badge');
            if (badge) badge.remove();
            info.classList.remove('dealer');
            if (index === state.dealerIndex) {
                info.classList.add('dealer');
                badge = document.createElement('div');
                badge.className = 'dealer-badge'; badge.textContent = '庄';
                info.appendChild(badge);
            }

            var lookedBadge = info.querySelector('.looked-badge');
            if (lookedBadge) lookedBadge.remove();
            if (player.hasLooked && player.status !== 'folded') {
                lookedBadge = document.createElement('div');
                lookedBadge.className = 'looked-badge'; lookedBadge.textContent = '已看牌';
                info.appendChild(lookedBadge);
            }

            var baoxiBadge = info.querySelector('.baoxi-badge');
            if (baoxiBadge) baoxiBadge.remove();
            if (player.baoxi) {
                baoxiBadge = document.createElement('div');
                baoxiBadge.className = 'baoxi-badge'; baoxiBadge.textContent = '报喜';
                info.appendChild(baoxiBadge);
            }

            info.classList.remove('winner', 'winner-anim');

            renderCardsForPlayer(index, player, state);
        }

        function renderCardsForPlayer(index, player, state) {
            var container = $('cards' + index);

            if (player.cards && player.cards.length === 3) {
                // 有牌数据（已看牌或摊牌）→ 显示正面
                container.innerHTML = '';
                player.cards.forEach(function(card) {
                    var cardEl = createCardElement(card);
                    if (player.status === 'folded') cardEl.style.opacity = '0.5';
                    container.appendChild(cardEl);
                });
                if (state.phase === 'gameover' && player.handDesc && player.status !== 'folded') {
                    var tl = document.createElement('div');
                    tl.className = 'hand-type'; tl.textContent = player.handDesc;
                    container.appendChild(tl);
                }
            } else {
                // 无牌数据 → 显示牌背
                container.innerHTML = '';
                if (player.status !== 'folded' || state.phase === 'playing') {
                    for (var i = 0; i < 3; i++) {
                        var cardEl = document.createElement('div');
                        cardEl.className = 'card card-back';
                        container.appendChild(cardEl);
                    }
                }
            }
        }

        function createCardElement(card) {
            var cardEl = document.createElement('div');
            var isRed = card.suit === '♥' || card.suit === '♦';
            cardEl.className = 'card flipped ' + (isRed ? 'red' : 'black');
            cardEl.innerHTML = '<div class="card-front">' +
                '<div class="card-small"><span>' + card.rank + '</span><span class="card-suit">' + card.suit + '</span></div>' +
                '<span class="card-rank">' + card.rank + '</span>' +
                '<span class="card-suit">' + card.suit + '</span></div>';
            return cardEl;
        }

        // 【修复】自己看牌时的翻牌动画：从牌背翻转到牌面
        function flipMyCards(playerIndex, cards) {
            var container = $('cards' + playerIndex);
            var cardEls = container.querySelectorAll('.card');

            if (cardEls.length === 0) {
                // 还没有牌背元素，先创建再翻
                container.innerHTML = '';
                cards.forEach(function(card) {
                    var el = document.createElement('div');
                    el.className = 'card card-back';
                    container.appendChild(el);
                });
                cardEls = container.querySelectorAll('.card');
            }

            cardEls.forEach(function(cardEl, idx) {
                if (idx >= cards.length) return;
                var card = cards[idx];
                var isRed = card.suit === '♥' || card.suit === '♦';

                setTimeout(function() {
                    cardEl.classList.add('flipping');
                    setTimeout(function() {
                        cardEl.classList.remove('card-back', 'flipping');
                        cardEl.classList.add('flipped', isRed ? 'red' : 'black');
                        cardEl.innerHTML = '<div class="card-front">' +
                            '<div class="card-small"><span>' + card.rank + '</span><span class="card-suit">' + card.suit + '</span></div>' +
                            '<span class="card-rank">' + card.rank + '</span>' +
                            '<span class="card-suit">' + card.suit + '</span></div>';
                    }, 250);
                }, idx * 150);
            });
        }

        // 其他玩家看牌时的翻牌动画（只显示翻转效果，不显示内容）
        function flipOtherCards(playerIndex) {
            var cardEls = $('cards' + playerIndex).querySelectorAll('.card');
            cardEls.forEach(function(cardEl, idx) {
                setTimeout(function() {
                    cardEl.classList.add('flipping');
                    setTimeout(function() {
                        cardEl.classList.remove('flipping');
                    }, 500);
                }, idx * 150);
            });
        }

        // ==================== 操作面板 ====================

        var ACTION_CONFIG = {
            fold:    { label: '弃牌', cls: 'btn-fold' },
            look:    { label: '看牌', cls: 'btn-look' },
            call:    { label: '跟注', cls: 'btn-call' },
            raise:   { label: '加注', cls: 'btn-raise' },
            compare: { label: '敲牌', cls: 'btn-compare' }
        };

        function renderActionPanel(actions, compareTargets) {
            actionPanel.innerHTML = '';
            actionPanel.classList.remove('hidden');

            var baseBet = gameState.baseBet;
            var hasLooked = gameState.players[gameState.myIndex].hasLooked;
            var callAmount = hasLooked ? baseBet * 2 : baseBet;
            var raiseAmount = hasLooked ? baseBet * 4 : baseBet * 2;

            actions.forEach(function(action) {
                var cfg = ACTION_CONFIG[action];
                if (!cfg) return;

                var btn = document.createElement('button');
                btn.className = 'action-btn ' + cfg.cls;

                var label = cfg.label;
                if (action === 'call') label = '跟注 ' + callAmount;
                else if (action === 'raise') label = '加注 ' + raiseAmount;
                else if (action === 'compare') label = '敲牌 ' + callAmount;

                btn.textContent = label;

                if (action === 'compare' && compareTargets && compareTargets.length > 1) {
                    btn.onclick = function() { showCompareModal(compareTargets); };
                } else if (action === 'compare') {
                    btn.onclick = function() { socket.emit('action', { action: 'compare', target: compareTargets[0] }); };
                } else {
                    btn.onclick = function() { socket.emit('action', { action: action }); };
                }

                actionPanel.appendChild(btn);
            });
        }

        function showCompareModal(targets) {
            compareOptions.innerHTML = '';
            targets.forEach(function(t) {
                var name = gameState && gameState.players[t] ? gameState.players[t].name : ('玩家' + t);
                var opt = document.createElement('div');
                opt.className = 'compare-option'; opt.textContent = name;
                opt.onclick = function() { compareModal.classList.remove('show'); socket.emit('action', { action: 'compare', target: t }); };
                compareOptions.appendChild(opt);
            });
            compareModal.classList.add('show');
        }

        $('compareCancel').onclick = function() { compareModal.classList.remove('show'); };

        // ==================== 消息 ====================

        var msgTimer = null;
        function showMessage(text) {
            var m = $('gameMessage');
            m.textContent = text;
            m.classList.add('show');
            clearTimeout(msgTimer);
            msgTimer = setTimeout(function() { m.classList.remove('show'); }, 2500);
        }

        // ==================== 日志 ====================

        function addLogEntry(name, action, type, round) {
            var container = $('actionLogContainer');
            var entry = document.createElement('div');
            entry.className = 'action-log-entry';
            entry.innerHTML = '<span class="log-player-name">' + name + '</span> ' +
                '<span class="log-action ' + (type || '') + '">' + action + '</span>' +
                (round ? '<span class="log-round">第' + round + '轮</span>' : '');
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function clearLog() { $('actionLogContainer').innerHTML = ''; }
    })();
    </script>
</body>
</html>
